    <!-- Calendar Integration Script -->
    <script>
        // Global offcanvas instance
        let dayOffcanvas = null;

        // Initialize calendar after dashboard loads
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for dashboard to initialize, then add calendar
            setTimeout(initCalendar, 500);
        });

        async function initCalendar() {
            console.log('📅 Initializing Activity Calendar...');

            // Initialize offcanvas
            const offcanvasEl = document.getElementById('calendarDayOffcanvas');
            if (offcanvasEl) {
                dayOffcanvas = new bootstrap.Offcanvas(offcanvasEl);
            }

            // Create calendar instance (must be on window for onclick handlers)
            window.calendarView = new CalendarView('calendarGrid', {
                monthLabelId: 'currentMonth',
                prevButtonId: 'prevMonth',
                nextButtonId: 'nextMonth',
                onDayClick: showDayDetail
            });

            // Load sessions for calendar
            await loadCalendarSessions();

            // Reload calendar when auth state changes
            window.addEventListener('authStateChanged', async (event) => {
                console.log('📅 Auth state changed, reloading calendar...');
                await loadCalendarSessions();
            });
        }

        async function loadCalendarSessions() {
            console.log('📅 loadCalendarSessions() starting...');
            try {
                // Wait for Firebase/dataManager to be ready (with timeout)
                const waitForDataManager = async (maxWait = 5000) => {
                    const start = Date.now();
                    while (!window.dataManager && (Date.now() - start) < maxWait) {
                        await new Promise(r => setTimeout(r, 100));
                    }
                    return !!window.dataManager;
                };

                const dataManagerReady = await waitForDataManager();
                if (!dataManagerReady) {
                    console.warn('⚠️ DataManager not available - showing empty calendar');
                    window.calendarView.render();
                    return;
                }
                console.log('📅 DataManager is ready');

                // Wait for auth to be ready
                await window.dataManager.waitForAuthReady();
                console.log('📅 Auth is ready');

                if (!window.dataManager.isUserAuthenticated()) {
                    console.log('ℹ️ User not authenticated - showing empty calendar');
                    window.calendarView.render();
                    return;
                }
                console.log('📅 User is authenticated, fetching sessions...');

                const token = await window.dataManager.getAuthToken();
                const response = await fetch('/api/v3/workout-sessions/?page_size=100', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                console.log('📅 API response status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    const sessions = data.sessions || [];
                    console.log(`✅ Loaded ${sessions.length} sessions for calendar`);
                    if (sessions.length > 0) {
                        console.log('📅 Sample session dates:', sessions.slice(0, 3).map(s => ({
                            name: s.workout_name,
                            started: s.started_at,
                            completed: s.completed_at
                        })));
                    }
                    window.calendarView.setSessionData(sessions);
                } else {
                    const errorText = await response.text();
                    console.warn('⚠️ Could not load sessions for calendar, status:', response.status, 'Error:', errorText);
                    window.calendarView.render();
                }
            } catch (error) {
                console.error('❌ Error loading calendar sessions:', error);
                window.calendarView.render();
            }
        }

        function showDayDetail(dateKey, sessions) {
            const title = document.getElementById('selectedDayTitle');
            const content = document.getElementById('dayDetailContent');

            if (!title || !content) return;

            // Format the date for display
            const [year, month, day] = dateKey.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            title.textContent = date.toLocaleDateString('en-US', options);

            if (sessions.length === 0) {
                content.innerHTML = `
                    <div class="text-center py-4">
                        <i class="bx bx-calendar-x text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-3 mb-3">No workouts on this day</p>
                        <a href="workout-database.html" class="btn btn-primary">
                            <i class="bx bx-play me-1"></i>Start a workout
                        </a>
                    </div>
                `;
            } else {
                content.innerHTML = sessions.map(session => {
                    const duration = session.duration_minutes
                        ? (session.duration_minutes >= 60
                            ? `${Math.floor(session.duration_minutes / 60)}h ${session.duration_minutes % 60}m`
                            : `${session.duration_minutes}m`)
                        : '';

                    const statusBadge = session.status === 'completed'
                        ? '<span class="badge bg-success">Completed</span>'
                        : session.status === 'in_progress'
                            ? '<span class="badge bg-warning">In Progress</span>'
                            : '<span class="badge bg-secondary">Partial</span>';

                    // Build exercises count text (exercises_performed is an array)
                    const exerciseCount = session.exercises_performed?.length
                        ? `${session.exercises_performed.length} exercises`
                        : '';

                    return `
                        <div class="day-session-card card mb-2">
                            <div class="card-body py-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="day-session-info">
                                        <div class="day-session-name fw-semibold">${escapeHtmlCalendar(session.workout_name || 'Workout')}</div>
                                        <div class="day-session-meta text-muted small mt-1">
                                            ${duration ? `<i class="bx bx-time-five me-1"></i>${duration}` : ''}
                                            ${duration && exerciseCount ? '<span class="mx-1">•</span>' : ''}
                                            ${exerciseCount}
                                        </div>
                                    </div>
                                    <div class="day-session-badge">
                                        ${statusBadge}
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <a href="workout-history.html?session=${session.id}"
                                       class="btn btn-sm btn-outline-primary w-100">
                                        <i class="bx bx-show me-1"></i>View Session Details
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Show the offcanvas
            if (dayOffcanvas) {
                dayOffcanvas.show();
            }
        }

        function closeDayPanel() {
            if (dayOffcanvas) {
                dayOffcanvas.hide();
            }
        }

        function escapeHtmlCalendar(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Make functions globally available
        window.showDayDetail = showDayDetail;
        window.closeDayPanel = closeDayPanel;
    </script>
