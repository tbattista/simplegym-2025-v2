<!doctype html>

<html
  lang="en"
  class="layout-menu-fixed layout-compact"
  data-assets-path="/static/assets/"
  data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Workout History - Ghost Gym</title>

    <meta name="description" content="Review your past workouts and track your progress" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/assets/img/favicon/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="/static/assets/vendor/fonts/iconify-icons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/assets/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />

    <!-- Custom Ghost Gym CSS -->
    <link rel="stylesheet" href="/static/assets/css/ghost-gym-custom.css" />
    
    <!-- Navbar CSS -->
    <link rel="stylesheet" href="/static/assets/css/navbar-custom.css" />
    
    <!-- Component CSS (includes all component styles) -->
    <link rel="stylesheet" href="/static/assets/css/components.css" />
    
    <!-- Dashboard Demo CSS -->
    <link rel="stylesheet" href="/static/assets/css/dashboard-demo.css" />
    
    <!-- Bottom Action Bar CSS -->
    <link rel="stylesheet" href="/static/assets/css/bottom-action-bar.css?v=3.0.2" />

    <!-- Helpers -->
    <script src="/static/assets/vendor/js/helpers.js"></script>
    <script src="/static/assets/js/config.js"></script>

    <!-- Theme Manager (must load early to prevent flash) -->
    <script src="/static/assets/js/services/theme-manager.js"></script>

    <!-- Ghost Gym Centralized Configuration -->
    <script src="/static/assets/js/app-config.js"></script>
    
    <!-- Firebase SDK Loader (Centralized) -->
    <script type="module" src="/static/assets/js/firebase-loader.js"></script>
  </head>

  <body>
    
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <!-- Page Header -->
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                  <h4 class="mb-1">
                    <i class="bx bx-history me-2"></i>
                    Workout History
                  </h4>
                  <p class="text-muted mb-0">Review your past workouts and progress</p>
                </div>
                <a href="dashboard.html" class="btn btn-sm btn-outline-primary">
                  <i class="bx bx-arrow-back me-1"></i>
                  Back to Dashboard
                </a>
              </div>

              <!-- Filter Controls -->
              <div class="card mb-4">
                <div class="card-body">
                  <div class="row g-3">
                    <!-- Date Range Filter -->
                    <div class="col-12 col-md-6">
                      <label class="form-label">Date Range</label>
                      <select class="form-select" id="dateRangeFilter">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                        <option value="365">Last Year</option>
                        <option value="all">All Time</option>
                      </select>
                    </div>

                    <!-- Workout Type Filter -->
                    <div class="col-12 col-md-6">
                      <label class="form-label">Workout Type</label>
                      <select class="form-select" id="workoutTypeFilter">
                        <option value="all">All Workouts</option>
                        <!-- Will be populated dynamically -->
                      </select>
                    </div>
                  </div>

                  <!-- Stats Summary -->
                  <div class="row mt-4">
                    <div class="col-6 col-md-3">
                      <div class="text-center">
                        <h5 class="mb-0" id="totalSessions">-</h5>
                        <small class="text-muted">Total Sessions</small>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="text-center">
                        <h5 class="mb-0" id="totalDuration">-</h5>
                        <small class="text-muted">Total Time</small>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="text-center">
                        <h5 class="mb-0" id="totalVolume">-</h5>
                        <small class="text-muted">Total Volume</small>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="text-center">
                        <h5 class="mb-0" id="avgDuration">-</h5>
                        <small class="text-muted">Avg Duration</small>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Loading State -->
              <div id="sessionsLoading" style="display: none;">
                <div class="text-center py-5">
                  <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                  <p class="text-muted mt-3">Loading your workout history...</p>
                </div>
              </div>

              <!-- Empty State -->
              <div id="emptyState" style="display: none;">
                <div class="text-center py-5">
                  <i class="bx bx-history" style="font-size: 4rem; color: var(--bs-gray-400);"></i>
                  <h5 class="mt-3">No Workout History</h5>
                  <p class="text-muted">Complete your first workout to see it here</p>
                  <a href="dashboard.html" class="btn btn-primary mt-3">
                    <i class="bx bx-arrow-back me-2"></i>
                    Back to Dashboard
                  </a>
                </div>
              </div>

              <!-- Sessions List (Grouped by Month) -->
              <div id="sessionsContainer">
                <!-- Sessions will be rendered by JS, grouped by month -->
              </div>

            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->

    <!-- Session Detail Modal -->
    <div class="modal fade" id="sessionDetailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="sessionModalTitle">Workout Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="sessionModalBody">
            <!-- Session details will be rendered here -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Core JS -->
    <script src="/static/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/assets/vendor/libs/popper/popper.js"></script>
    <script src="/static/assets/vendor/js/bootstrap.js"></script>
    <script src="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/static/assets/vendor/js/menu.js"></script>

    <!-- Load templates FIRST (before main.js) -->
    <script src="/static/assets/js/components/menu-template.js"></script>
    <script src="/static/assets/js/components/navbar-template.js"></script>
    <script src="/static/assets/js/components/auth-modals-template.js"></script>
    
    <!-- Inject components SECOND (before main.js) -->
    <script src="/static/assets/js/services/menu-injection-service.js"></script>
    <script src="/static/assets/js/services/navbar-injection-service.js"></script>
    
    <!-- Feedback System (Global) -->
    <script src="/static/assets/js/services/feedback-injection-service.js"></script>

    <!-- Main JS -->
    <script src="/static/assets/js/main.js"></script>
    
    <!-- Bottom Action Bar (load after main.js) -->
    <script src="/static/assets/js/config/bottom-action-bar-config.js?v=2.0.5"></script>
    <script src="/static/assets/js/services/bottom-action-bar-service.js?v=3.0.3"></script>

    <!-- Firebase Services -->
    <script src="/static/assets/js/firebase/firebase-init.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-service.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-ui.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/data-manager.js?v=20251020-05"></script>

    <!-- Common Utilities -->
    <script src="/static/assets/js/utils/common-utils.js"></script>

    <!-- Dashboard Components -->
    <script src="/static/assets/js/dashboard/recent-session-card.js"></script>

    <!-- Workout Sessions Page Logic -->
    <script>
      // Global state for workout sessions
      window.workoutSessions = {
        allSessions: [],
        filteredSessions: [],
        filters: {
          dateRange: 30,
          workoutType: 'all'
        }
      };

      /**
       * Initialize workout sessions page
       */
      async function initWorkoutSessions() {
        console.log('📊 Initializing Workout Sessions Page...');
        
        try {
          // Wait for Firebase if using real data
          if (window.firebaseReady && window.dataManager) {
            await window.dataManager.waitForAuthReady();
          }
          
          // Load sessions
          await loadSessions();
          
          // Set up event listeners
          setupEventListeners();
          
          console.log('✅ Workout Sessions page initialized');
          
        } catch (error) {
          console.error('❌ Error initializing workout sessions:', error);
          showError('Failed to load workout history');
        }
      }

      /**
       * Load workout sessions
       */
      async function loadSessions() {
        showLoading();
        
        try {
          // Check if user is authenticated and try to load real data
          if (window.dataManager?.isUserAuthenticated()) {
            await loadRealSessions();
          } else {
            loadMockSessions();
          }
          
          // Apply filters and render
          applyFilters();
          renderSessions();
          updateStats();
          
          hideLoading();
        } catch (error) {
          console.error('❌ Error loading sessions:', error);
          loadMockSessions();
          applyFilters();
          renderSessions();
          updateStats();
          hideLoading();
        }
      }

      /**
       * Load real sessions from Firebase
       */
      async function loadRealSessions() {
        try {
          const token = await window.dataManager.getAuthToken();
          const response = await fetch('/api/v3/workout-sessions/?page_size=100&sort=desc', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (response.ok) {
            const data = await response.json();
            window.workoutSessions.allSessions = data.sessions || [];
            console.log(`✅ Loaded ${window.workoutSessions.allSessions.length} real sessions`);
          } else {
            throw new Error('Failed to fetch sessions');
          }
        } catch (error) {
          console.warn('⚠️ Could not load real sessions:', error);
          throw error;
        }
      }

      /**
       * Load mock sessions for demo
       */
      function loadMockSessions() {
        console.log('📦 Loading mock sessions for demo');
        
        window.workoutSessions.allSessions = [
          {
            id: 'session-1',
            workout_name: 'Push Day A',
            completed_at: new Date().toISOString(),
            duration_minutes: 52,
            exercises_performed: [
              { exercise_name: 'Bench Press', weight: 185, target_sets: 4, target_reps: 8, is_skipped: false },
              { exercise_name: 'Incline DB Press', weight: 65, target_sets: 3, target_reps: 10, is_skipped: false },
              { exercise_name: 'Cable Flyes', weight: 30, target_sets: 3, target_reps: 12, is_skipped: false }
            ]
          },
          {
            id: 'session-2',
            workout_name: 'Pull Day',
            completed_at: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString(),
            duration_minutes: 48,
            exercises_performed: [
              { exercise_name: 'Pull-ups', weight: 0, target_sets: 4, target_reps: 8, is_skipped: false },
              { exercise_name: 'Barbell Rows', weight: 135, target_sets: 4, target_reps: 8, is_skipped: false }
            ]
          },
          {
            id: 'session-3',
            workout_name: 'Leg Day',
            completed_at: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString(),
            duration_minutes: 55,
            exercises_performed: [
              { exercise_name: 'Squats', weight: 225, target_sets: 5, target_reps: 5, is_skipped: false },
              { exercise_name: 'Romanian Deadlifts', weight: 185, target_sets: 3, target_reps: 10, is_skipped: false }
            ]
          }
        ];
      }

      /**
       * Apply filters to sessions
       */
      function applyFilters() {
        let filtered = [...window.workoutSessions.allSessions];
        
        // Date range filter
        const dateRange = window.workoutSessions.filters.dateRange;
        if (dateRange !== 'all') {
          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - parseInt(dateRange));
          filtered = filtered.filter(s => new Date(s.completed_at) >= cutoffDate);
        }
        
        // Workout type filter
        const workoutType = window.workoutSessions.filters.workoutType;
        if (workoutType !== 'all') {
          filtered = filtered.filter(s => s.workout_name === workoutType);
        }
        
        window.workoutSessions.filteredSessions = filtered;
      }

      /**
       * Render sessions grouped by month
       */
      function renderSessions() {
        const container = document.getElementById('sessionsContainer');
        const sessions = window.workoutSessions.filteredSessions;
        
        if (sessions.length === 0) {
          container.style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
          return;
        }
        
        container.style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        
        // Group sessions by month
        const grouped = groupSessionsByMonth(sessions);
        
        // Render each month group
        container.innerHTML = '';
        Object.keys(grouped).forEach(monthKey => {
          const monthSessions = grouped[monthKey];
          const monthSection = document.createElement('div');
          monthSection.className = 'mb-4';
          
          // Month header
          const header = document.createElement('h5');
          header.className = 'mb-3';
          header.textContent = monthKey;
          monthSection.appendChild(header);
          
          // Session cards
          monthSessions.forEach(session => {
            const card = new RecentSessionCard(session, { expandable: true });
            monthSection.appendChild(card.render());
          });
          
          container.appendChild(monthSection);
        });
      }

      /**
       * Group sessions by month
       */
      function groupSessionsByMonth(sessions) {
        const groups = {};
        
        sessions.forEach(session => {
          const date = new Date(session.completed_at);
          const monthKey = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
          
          if (!groups[monthKey]) {
            groups[monthKey] = [];
          }
          groups[monthKey].push(session);
        });
        
        return groups;
      }

      /**
       * Update stats summary
       */
      function updateStats() {
        const sessions = window.workoutSessions.filteredSessions;
        
        // Total sessions
        document.getElementById('totalSessions').textContent = sessions.length;
        
        // Total duration
        const totalMinutes = sessions.reduce((sum, s) => sum + (s.duration_minutes || 0), 0);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        document.getElementById('totalDuration').textContent = hours > 0 
          ? `${hours}h ${minutes}m` 
          : `${minutes}m`;
        
        // Total volume
        const totalVolume = sessions.reduce((sum, session) => {
          const exercises = session.exercises_performed || [];
          return sum + exercises.reduce((exSum, ex) => {
            if (ex.is_skipped) return exSum;
            return exSum + ((ex.weight || 0) * (ex.target_sets || 0) * (ex.target_reps || 0));
          }, 0);
        }, 0);
        document.getElementById('totalVolume').textContent = `${Math.round(totalVolume / 1000)}K lbs`;
        
        // Average duration
        const avgMinutes = sessions.length > 0 ? Math.round(totalMinutes / sessions.length) : 0;
        document.getElementById('avgDuration').textContent = `${avgMinutes}min`;
      }

      /**
       * Set up event listeners
       */
      function setupEventListeners() {
        // Date range filter
        document.getElementById('dateRangeFilter').addEventListener('change', (e) => {
          window.workoutSessions.filters.dateRange = e.target.value;
          applyFilters();
          renderSessions();
          updateStats();
        });
        
        // Workout type filter
        document.getElementById('workoutTypeFilter').addEventListener('change', (e) => {
          window.workoutSessions.filters.workoutType = e.target.value;
          applyFilters();
          renderSessions();
          updateStats();
        });
        
        // Populate workout type options
        populateWorkoutTypeFilter();
      }

      /**
       * Populate workout type filter dropdown
       */
      function populateWorkoutTypeFilter() {
        const select = document.getElementById('workoutTypeFilter');
        const sessions = window.workoutSessions.allSessions;
        
        // Get unique workout names
        const workoutNames = [...new Set(sessions.map(s => s.workout_name))];
        
        // Add options
        workoutNames.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
      }

      /**
       * Show loading state
       */
      function showLoading() {
        document.getElementById('sessionsLoading').style.display = 'block';
        document.getElementById('sessionsContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';
      }

      /**
       * Hide loading state
       */
      function hideLoading() {
        document.getElementById('sessionsLoading').style.display = 'none';
      }

      /**
       * Show error message
       */
      function showError(message) {
        console.error('Sessions Error:', message);
        // Could show toast or alert
      }

      // Initialize on DOM ready
      document.addEventListener('DOMContentLoaded', initWorkoutSessions);
    </script>
  </body>
</html>
