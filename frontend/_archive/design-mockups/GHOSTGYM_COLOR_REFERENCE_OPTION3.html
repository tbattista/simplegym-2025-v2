<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Gym V2 — Color Reference (Option 3: Soft Clay + Slate)</title>

  <style>
    :root{
      --gg-primary:#C97C5D;
      --gg-secondary:#64748B;
      --gg-accent:#E5E7EB;
      --gg-bg:#FBFAF8;
      --gg-surface:#FFFFFF;
      --gg-text:#1F2937;
      --gg-muted:#6B7280;
      --gg-success:#8CBF9F;
      --gg-warning:#E3A14F;
      --gg-danger:#D66A6A;

      --radius-card: 20px;
      --shadow-card: 0 2px 10px rgba(15,23,42,.06);
      --border: 1px solid rgba(15,23,42,.10);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background: var(--gg-bg);
      color: var(--gg-text);
      line-height: 1.6;
      padding: 2rem;
    }

    .container{max-width:1200px;margin:0 auto}

    h1{
      font-size: 2.5rem;
      margin-bottom: .5rem;
      color: var(--gg-primary);
      letter-spacing: -.4px;
    }

    .subtitle{
      color: var(--gg-muted);
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }

    h2{
      font-size: 1.5rem;
      margin: 2rem 0 1rem;
      color: var(--gg-text);
      border-bottom: 2px solid var(--gg-accent);
      padding-bottom: .5rem;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card{
      background: var(--gg-surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      border: var(--border);
      box-shadow: var(--shadow-card);
    }

    .swatch{
      height: 80px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight: 800;
      font-size: .9rem;
    }

    .swatch.dark-text{
      color: var(--gg-text);
    }

    .info{padding: 1rem}

    .name{font-weight: 800; font-size: .98rem; margin-bottom: .25rem;}
    .var{font-family: monospace;font-size: .75rem;color: var(--gg-primary);}
    .hex{font-size: .82rem;color: var(--gg-muted);}
  </style>
</head>

<body>
  <div class="container">
    <h1>Ghost Gym V2</h1>
    <p class="subtitle">Design System – Color Reference (Option 3: Soft Clay + Slate)</p>

    <h2>Brand Colors</h2>
    <div class="grid">
      <div class="card">
        <div class="swatch" style="background:var(--gg-primary)">#C97C5D</div>
        <div class="info">
          <div class="name">Primary (Clay)</div>
          <div class="var">--gg-primary</div>
          <div class="hex">#C97C5D</div>
        </div>
      </div>

      <div class="card">
        <div class="swatch" style="background:var(--gg-secondary)">#64748B</div>
        <div class="info">
          <div class="name">Secondary (Slate)</div>
          <div class="var">--gg-secondary</div>
          <div class="hex">#64748B</div>
        </div>
      </div>

      <div class="card">
        <div class="swatch dark-text" style="background:var(--gg-accent)">#E5E7EB</div>
        <div class="info">
          <div class="name">Accent / Borders</div>
          <div class="var">--gg-accent</div>
          <div class="hex">#E5E7EB</div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
