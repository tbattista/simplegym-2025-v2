<!DOCTYPE html>

<html
  lang="en"
  class="layout-menu-fixed layout-compact"
  data-assets-path="/static/assets/"
  data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    
    <title>History - Ghost Gym</title>

    <meta name="description" content="View your workout history and performance metrics" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/assets/img/favicon/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="/static/assets/vendor/fonts/iconify-icons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/assets/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />

    <!-- Custom Ghost Gym CSS -->
    <link rel="stylesheet" href="/static/assets/css/ghost-gym-custom.css" />
    
    <!-- Shared Components CSS -->
    <link rel="stylesheet" href="/static/assets/css/components.css" />
    
    <!-- Navbar CSS -->
    <link rel="stylesheet" href="/static/assets/css/navbar-custom.css" />
    
    <!-- Workout History CSS (Modular) -->
    <link rel="stylesheet" href="/static/assets/css/workout-history.css" />
    <link rel="stylesheet" href="/static/assets/css/components/workout-history-sessions.css" />
    <link rel="stylesheet" href="/static/assets/css/components/workout-history-exercises.css" />
    <link rel="stylesheet" href="/static/assets/css/components/workout-history-toolbar.css" />

    <!-- Calendar View CSS -->
    <link rel="stylesheet" href="/static/assets/css/components/calendar-view.css" />

    <!-- Helpers -->
    <script src="/static/assets/vendor/js/helpers.js"></script>
    <script src="/static/assets/js/config.js"></script>

    <!-- Theme Manager (must load early to prevent flash) -->
    <script src="/static/assets/js/services/theme-manager.js"></script>

    <!-- Ghost Gym Centralized Configuration -->
    <script src="/static/assets/js/app-config.js"></script>
    
    <!-- Firebase SDK Loader (Centralized) -->
    <script type="module" src="/static/assets/js/firebase-loader.js"></script>
  </head>

  <body>
    
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <!-- Page Header -->
              <div class="mb-4">
                <h4 class="mb-2" id="workoutHistoryTitle">
                  <span id="workoutName">Loading...</span>
                </h4>
                <p class="text-muted mb-0" id="workoutDescription"></p>
              </div>

              <!-- Loading State -->
              <div id="historyLoadingState" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading workout history...</span>
                </div>
                <p class="mt-3 text-muted">Loading workout history...</p>
              </div>
              
              <!-- Error State -->
              <div id="historyErrorState" class="text-center py-5" style="display: none;">
                <i class="bx bx-error-circle display-1 text-danger"></i>
                <h5 class="mt-3">Error Loading History</h5>
                <p class="text-muted" id="historyErrorMessage"></p>
                <button class="btn btn-primary mt-2" onclick="location.reload()">
                  <i class="bx bx-refresh me-1"></i>Retry
                </button>
              </div>
              
              <!-- Empty State -->
              <div id="historyEmptyState" class="text-center py-5" style="display: none;">
                <i class="bx bx-calendar-x display-1 text-muted"></i>
                <h5 class="mt-3">No Workout History Yet</h5>
                <p class="text-muted">Complete your first workout to see your history here</p>
                <a href="workout-database.html" class="btn btn-primary mt-2">
                  <i class="bx bx-dumbbell me-1"></i>Start a Workout
                </a>
              </div>
              
              <!-- History Content -->
              <div id="historyContent" style="display: none;">

                <!-- Tab Navigation with Calendar Toggle -->
                <div class="history-tabs-wrapper d-flex align-items-end mb-4">
                  <ul class="nav nav-tabs history-tabs flex-grow-1 mb-0" id="historyTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                      <button class="nav-link active" id="history-tab" data-bs-toggle="tab"
                              data-bs-target="#historyTabPane" type="button" role="tab"
                              aria-controls="historyTabPane" aria-selected="true">
                        <i class="bx bx-history me-1"></i>History
                      </button>
                    </li>
                    <li class="nav-item" role="presentation">
                      <button class="nav-link" id="insights-tab" data-bs-toggle="tab"
                              data-bs-target="#insightsTabPane" type="button" role="tab"
                              aria-controls="insightsTabPane" aria-selected="false">
                        <i class="bx bx-bar-chart-alt-2 me-1"></i>Insights
                      </button>
                    </li>
                  </ul>
                  <!-- Calendar Toggle (next to tabs) -->
                  <button class="btn btn-icon calendar-tab-btn"
                          type="button"
                          id="calendarTabBtn"
                          data-bs-toggle="collapse"
                          data-bs-target="#historyCalendarCollapse"
                          aria-expanded="false"
                          aria-controls="historyCalendarCollapse"
                          title="Toggle calendar">
                    <i class="bx bx-calendar"></i>
                  </button>
                </div>

                <!-- Tab Content -->
                <div class="tab-content" id="historyTabContent">

                  <!-- History Tab -->
                  <div class="tab-pane fade show active" id="historyTabPane" role="tabpanel"
                       aria-labelledby="history-tab" tabindex="0">

                    <!-- Calendar Panel (collapsible, appears below filter bar) -->
                    <div class="collapse" id="historyCalendarCollapse">
                      <div class="calendar-panel mb-3" id="historyCalendarCard">
                        <!-- Month Navigation -->
                        <div class="calendar-panel-header">
                          <button id="historyPrevMonth" class="btn btn-sm btn-icon btn-outline-secondary rounded-circle">
                            <i class="bx bx-chevron-left"></i>
                          </button>
                          <span id="historyCurrentMonth" class="fw-medium">January 2026</span>
                          <button id="historyNextMonth" class="btn btn-sm btn-icon btn-outline-secondary rounded-circle">
                            <i class="bx bx-chevron-right"></i>
                          </button>
                        </div>
                        <!-- Calendar Grid -->
                        <div id="historyCalendarGrid" class="calendar-grid">
                          <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-primary" role="status">
                              <span class="visually-hidden">Loading calendar...</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Date Filter Indicator (shown when filtering by date) -->
                    <div id="dateFilterIndicator" class="date-filter-indicator mb-3" style="display: none;">
                      <span class="date-filter-text">
                        <i class="bx bx-calendar-check me-1"></i>
                        Showing workouts for <strong id="dateFilterLabel"></strong>
                      </span>
                      <button class="btn btn-sm btn-link text-danger p-0 ms-2" onclick="clearDateFilter()">
                        <i class="bx bx-x"></i> Clear
                      </button>
                    </div>

                    <!-- Session History (Time-Grouped) -->
                    <div id="sessionHistoryContainer">
                      <!-- Session entries will be rendered here -->
                    </div>
                  </div>

                  <!-- Insights Tab -->
                  <div class="tab-pane fade" id="insightsTabPane" role="tabpanel"
                       aria-labelledby="insights-tab" tabindex="0">

                    <!-- Statistics Cards -->
                    <div class="row g-3 mb-4" id="statisticsCards">
                      <!-- Cards will be rendered by JS -->
                    </div>

                    <!-- Exercise Performance Section -->
                    <div class="mb-4">
                      <h5 class="mb-2">Exercises</h5>
                      <p class="exercise-section-hint text-muted small mb-3">Last working set shown per exercise</p>
                      <div id="exercisePerformanceContainer">
                        <!-- Exercise performance cards will be rendered here -->
                      </div>
                    </div>
                  </div>

                </div>

              </div>
              
            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->

    <!-- Core JS -->
    <script src="/static/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/assets/vendor/libs/popper/popper.js"></script>
    <script src="/static/assets/vendor/js/bootstrap.js"></script>
    <script src="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/static/assets/vendor/js/menu.js"></script>

    <!-- Load templates FIRST -->
    <script src="/static/assets/js/components/menu-template.js"></script>
    <script src="/static/assets/js/components/navbar-template.js"></script>
    <script src="/static/assets/js/components/auth-modals-template.js"></script>
    
    <!-- Inject components SECOND -->
    <script src="/static/assets/js/services/menu-injection-service.js"></script>
    <script src="/static/assets/js/services/navbar-injection-service.js"></script>
    
    <!-- Feedback System (Global) -->
    <script src="/static/assets/js/services/feedback-injection-service.js"></script>

    <!-- Main JS -->
    <script src="/static/assets/js/main.js"></script>

    <!-- Firebase Services -->
    <script src="/static/assets/js/firebase/firebase-init.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-service.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-ui.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/data-manager.js?v=20251020-05"></script>

    <!-- Common Utilities (MUST load before other dashboard scripts) -->
    <script src="/static/assets/js/utils/common-utils.js"></script>

    <!-- UI Helpers -->
    <script src="/static/assets/js/dashboard/ui-helpers.js?v=20251020-04"></script>

    <!-- Calendar View Component -->
    <script src="/static/assets/js/components/calendar-view.js"></script>

    <!-- Workout History JS (Modular) -->
    <script src="/static/assets/js/dashboard/workout-history.js?v=3.1.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-utils.js?v=1.0.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-delete.js?v=1.0.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-exercises.js?v=1.0.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-calendar.js?v=1.0.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-filters.js?v=1.0.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-sessions.js?v=1.2.0"></script>
    <script src="/static/assets/js/dashboard/workout-history-loader.js?v=1.0.0"></script>

    <!-- Initialize -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Workout History Page - DOM Ready');

            // Wait for Firebase to be ready
            if (!window.firebaseReady) {
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
            }

            // Wait for data manager to be ready
            if (!window.dataManager) {
                console.error('❌ Data manager not available');
                return;
            }

            // Wait for auth state to settle
            await new Promise(resolve => setTimeout(resolve, 1000));

            // Only initialize if user is authenticated
            if (window.dataManager.isUserAuthenticated()) {
                console.log('✅ User authenticated, loading workout history');
                if (window.initWorkoutHistory) {
                    await window.initWorkoutHistory();
                }
            } else {
                console.log('⏭️ User not authenticated, waiting for auth state change');
                // Show loading state - will be handled by auth state change event
            }

            console.log('✅ Workout History page ready!');
        });

        // Listen for auth state changes
        window.addEventListener('authStateChanged', async (event) => {
            const { user, isAuthenticated } = event.detail;
            console.log('🔄 Auth state changed on workout history page', { isAuthenticated });

            // Only reload if user is authenticated
            if (!isAuthenticated) {
                console.log('⏭️ User not authenticated, skipping history load');
                return;
            }

            // Wait a moment for data manager to update its mode
            await new Promise(resolve => setTimeout(resolve, 300));

            // Reinitialize - handles all URL patterns (all sessions, single workout, session jump)
            if (window.initWorkoutHistory) {
                await window.initWorkoutHistory();
            }
        });
    </script>
  </body>
</html>
