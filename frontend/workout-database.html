<!doctype html>

<html
  lang="en"
  class="layout-menu-fixed layout-compact"
  data-assets-path="/static/assets/"
  data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Library - Ghost Gym</title>

    <meta name="description" content="Browse and manage your workout templates" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/assets/img/favicon/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"

    <link rel="stylesheet" href="/static/assets/vendor/css/core.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />

    <link rel="stylesheet" href="/static/assets/css/ghost-gym-custom.css" />
    
    <!-- Navbar CSS -->
    <link rel="stylesheet" href="/static/assets/css/navbar-custom.css" />
    
    <!-- Component CSS (includes all component styles) -->
    <link rel="stylesheet" href="/static/assets/css/components.css" />

    <!-- Helpers -->
    <script src="/static/assets/vendor/js/helpers.js"></script>
    <script src="/static/assets/js/config.js"></script>

    <!-- Theme Manager (must load early to prevent flash) -->
    <script src="/static/assets/js/services/theme-manager.js"></script>

    <!-- Ghost Gym Centralized Configuration -->
    <script src="/static/assets/js/app-config.js"></script>
    
    <!-- Firebase SDK Loader (Centralized) -->
    <script type="module" src="/static/assets/js/firebase-loader.js"></script>

  <body>
    
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">

              <!-- Page Header -->
              <div class="mb-3">
                <h6 class="mb-2">
                  <i class="bx bx-library me-1"></i>
                  Workout Library
                </h6>
                <p class="text-muted small mb-3">Browse and manage your <span id="totalWorkoutsCount">0</span> workout templates</p>
              </div>

              <!-- Workout Toolbar -->
              <div class="workout-toolbar mb-3" id="workoutToolbar">
                <!-- Search Input -->
                <div class="workout-toolbar-search">
                  <i class="bx bx-search"></i>
                  <input type="text"
                         id="workoutSearchInput"
                         placeholder="Search workouts..."
                         autocomplete="off">
                  <button class="workout-toolbar-clear"
                          id="clearSearchBtn"
                          style="display: none;"
                          type="button">
                    <i class="bx bx-x"></i>
                  </button>
                </div>

                <!-- Sort Cycle Button -->
                <button class="btn btn-outline-secondary workout-toolbar-btn"
                        id="sortCycleBtn"
                        type="button"
                        onclick="cycleWorkoutSort()">
                  <i class="bx bx-sort-alt-2"></i>
                  <span class="sort-label">Newest</span>
                </button>

                <!-- Filter Button -->
                <button class="btn btn-outline-secondary workout-toolbar-btn"
                        id="filterBtn"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#filtersOffcanvas">
                  <i class="bx bx-filter"></i>
                  <span class="filter-label">Filter</span>
                  <span class="filter-badge badge bg-primary ms-1" id="filterBadge" style="display: none;">0</span>
                </button>

                <!-- Create Button -->
                <button class="btn btn-primary workout-toolbar-btn"
                        type="button"
                        onclick="window.location.href='/workout-builder.html?new=true'">
                  <i class="bx bx-plus"></i>
                  <span class="create-label">New</span>
                </button>
              </div>

              <!-- Favorites Section -->
              <div id="favoritesSection" class="mb-4" style="display: none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h6 class="section-header mb-0">
                    <i class="bx bx-star me-1"></i>
                    Favorites
                  </h6>
                  <a href="#" class="small text-muted" id="viewAllFavorites">View all</a>
                </div>
                <div id="favoritesContent">
                  <!-- Populated by JS -->
                </div>
              </div>

              <!-- My Workouts Section -->
              <div id="myWorkoutsSection" class="mb-3">
                <h6 class="section-header mb-3">
                  <i class="bx bx-dumbbell me-1"></i>
                  My Workouts
                </h6>

                <!-- Hidden delete mode toggle (controlled by More menu) -->
                <input class="form-check-input" type="checkbox" role="switch"
                       id="deleteModeToggle" style="display: none;">

                <!-- DataTable Container -->
                <div id="workoutTableContainer"></div>
              </div>
            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->

    <!-- Filters Offcanvas (Bottom) -->
    <div class="offcanvas offcanvas-bottom offcanvas-bottom-base" tabindex="-1" id="filtersOffcanvas" aria-labelledby="filtersOffcanvasLabel" data-bs-scroll="false" style="height: auto; max-height: 60vh;">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="filtersOffcanvasLabel">
          <i class="bx bx-filter-alt me-2"></i>
          Filter Workouts
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <!-- Favorites Filter -->
        <div class="mb-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="favoritesFilterToggle">
            <label class="form-check-label fw-semibold" for="favoritesFilterToggle">
              <i class="bx bxs-heart text-danger me-1"></i>
              Favorites only
            </label>
          </div>
        </div>

        <!-- Tags Filter -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Filter by Tags</label>
          <div id="tagsFilterContainer">
            <p class="text-muted small">Loading tags...</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Your Stats</label>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Total Workouts:</span>
            <span class="fw-semibold" id="totalCount">0</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted">Showing:</span>
            <span class="fw-semibold" id="showingCount">0</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="pt-3 border-top">
          <button type="button" class="btn btn-outline-secondary w-100 mb-2" id="clearFiltersBtn">
            <i class="bx bx-x me-1"></i>
            Clear Filters
          </button>
          <button type="button" class="btn btn-primary w-100" data-bs-dismiss="offcanvas">
            <i class="bx bx-check me-1"></i>
            Done
          </button>
        </div>
      </div>
    </div>

    <!-- Workout Detail Offcanvas will be created dynamically by WorkoutDetailOffcanvas component -->

    <!-- Core JS -->
    <script src="/static/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/assets/vendor/libs/popper/popper.js"></script>
    <script src="/static/assets/vendor/js/bootstrap.js"></script>
    <script src="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/static/assets/vendor/js/menu.js"></script>

    <!-- Load templates FIRST (before main.js) -->
    <script src="/static/assets/js/components/menu-template.js"></script>
    <script src="/static/assets/js/components/navbar-template.js"></script>
    <script src="/static/assets/js/components/auth-modals-template.js"></script>
    
    <!-- Inject components SECOND (before main.js) -->
    <script src="/static/assets/js/services/menu-injection-service.js"></script>
    <script src="/static/assets/js/services/navbar-injection-service.js"></script>
    
    <!-- Feedback System (Global) -->
    <script src="/static/assets/js/services/feedback-injection-service.js"></script>

    <!-- Main JS -->
    <script src="/static/assets/js/main.js"></script>
    
    <!-- Firebase Services -->
    <script src="/static/assets/js/firebase/firebase-init.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-service.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-ui.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/data-manager.js?v=20251020-05"></script>

    <!-- Common Utilities (MUST load before other dashboard scripts) -->
    <script src="/static/assets/js/utils/common-utils.js"></script>
    
    <!-- Dropdown Z-Index Fix (for workout cards) -->
    <script src="/static/assets/js/utils/dropdown-z-index-fix.js"></script>

    <!-- Component Scripts -->
    <script src="/static/assets/js/components/base-page.js"></script>
    <script src="/static/assets/js/components/data-table.js"></script>
    <script src="/static/assets/js/components/filter-bar.js"></script>
    <script src="/static/assets/js/components/pagination.js"></script>
    <script src="/static/assets/js/components/modal-manager.js"></script>
    
    <!-- Offcanvas Manager (Phase 1 - Centralized lifecycle) -->
    <script src="/static/assets/js/components/offcanvas/offcanvas-manager.js?v=20251220-01"></script>
    
    <!-- Unified Offcanvas Factory (Modular v3.0.0) -->
    <script type="module" src="/static/assets/js/components/offcanvas/index.js?v=20251220-02"></script>
    
    <!-- Shared Workout Components -->
    <script src="/static/assets/js/components/workout-card.js"></script>
    <script src="/static/assets/js/components/workout-grid.js"></script>
    <script src="/static/assets/js/components/workout-detail-offcanvas.js"></script>
    <script src="/static/assets/js/components/starter-workout.js"></script>
    <script src="/static/assets/js/components/share-modal.js"></script>

    <!-- Workout Database JS (Refactored) -->
    <script src="/static/assets/js/dashboard/workout-database.js?v=3.0.0"></script>

    <!-- UI Helpers -->
    <script src="/static/assets/js/dashboard/ui-helpers.js?v=20251020-04"></script>

    <!-- Initialize Workout Database -->
    <script>
        // Initialize global state for workout database
        window.ghostGym = window.ghostGym || {};
        window.ghostGym.workoutDatabase = {
            all: [],
            filtered: [],
            displayed: [],
            currentPage: 1,
            pageSize: 50,
            deleteMode: false, // Track delete mode state
            selectedWorkoutIds: new Set(), // Track selected items for batch delete
            filters: {
                search: '',
                tags: [],
                sortBy: 'modified_date',
                sortOrder: 'desc',
                favoritesOnly: false
            },
            stats: {
                total: 0,
                showing: 0
            }
        };

        // Initialize page with proper auth waiting (fixes mobile race condition)
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Workout Database Page - DOM Ready');

            // 1. Wait for Firebase SDK to be ready
            if (!window.firebaseReady) {
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
            }

            // 2. Wait for data manager to exist
            if (!window.dataManager) {
                console.error('❌ Data manager not available');
                return;
            }

            // 3. Wait for auth state to be FULLY determined (key fix for mobile)
            await window.dataManager.waitForAuthReady();
            console.log('📄 Auth ready, storageMode:', window.dataManager.getStorageMode());

            // 4. Initialize if authenticated
            if (window.dataManager.isUserAuthenticated()) {
                console.log('✅ User authenticated, loading workout database');
                initWorkoutDatabase();
            } else {
                console.log('⏭️ User not authenticated, waiting for auth state change');
            }

            // 5. Listen for future auth state changes
            if (window.firebaseAuth) {
                window.firebaseAuth.onAuthStateChanged(async (user) => {
                    console.log('🔄 Auth state changed:', user ? 'authenticated' : 'not authenticated');

                    if (user) {
                        // Wait for dataManager to sync storageMode
                        await new Promise(resolve => setTimeout(resolve, 300));

                        if (window.loadWorkouts) {
                            await window.loadWorkouts();
                        }
                        if (window.renderFavoritesSection) {
                            window.renderFavoritesSection();
                        }
                    }
                });
            }

            console.log('✅ Workout Database page ready!');
        });

        async function initWorkoutDatabase() {
            console.log('🚀 Initializing Workout Database Page');

            // Set up event listeners
            document.getElementById('clearFiltersBtn')?.addEventListener('click', clearFilters);

            // Initialize favorites filter toggle
            document.getElementById('favoritesFilterToggle')?.addEventListener('change', (e) => {
                if (window.filterFavoritesOnly) {
                    window.filterFavoritesOnly(e.target.checked);
                }
            });

            // Initialize delete mode toggle
            if (window.initDeleteModeToggle) {
                initDeleteModeToggle();
            }

            // Initialize toolbar search
            if (window.initToolbarSearch) {
                initToolbarSearch();
            }

            // Load workouts
            await loadWorkouts();

            // Render Favorites section
            if (window.renderFavoritesSection) {
                renderFavoritesSection();
            }

            console.log('✅ Workout Database initialized');
        }
    </script>
  </body>
</html>
