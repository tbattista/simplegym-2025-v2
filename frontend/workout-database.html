    <!-- Initialize Workout Database -->
    <script>
        // Initialize global state for workout database
        window.ffn = window.ffn || {};
        window.ffn.workoutDatabase = {
            all: [],
            filtered: [],
            displayed: [],
            currentPage: 1,
            pageSize: 50,
            deleteMode: false, // Track delete mode state
            selectedWorkoutIds: new Set(), // Track selected items for batch delete
            filters: {
                search: '',
                tags: [],
                sortBy: 'modified_date',
                sortOrder: 'desc',
                favoritesOnly: false
            },
            stats: {
                total: 0,
                showing: 0
            }
        };

        // Initialize page - uses same pattern as index.html which works on mobile
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Workout Database Page - DOM Ready');

            // Check for pending toast from redirect (e.g., from workout-mode page)
            const pendingToast = sessionStorage.getItem('ffn_pending_toast');
            if (pendingToast) {
                sessionStorage.removeItem('ffn_pending_toast');
                try {
                    const toastConfig = JSON.parse(pendingToast);
                    setTimeout(() => {
                        if (window.showToast) {
                            window.showToast(toastConfig);
                        }
                    }, 500);
                } catch (e) {
                    console.warn('Failed to parse pending toast:', e);
                }
            }

            console.log('📄 [DEBUG] firebaseReady:', window.firebaseReady);
            console.log('📄 [DEBUG] firebaseAuth exists:', !!window.firebaseAuth);

            // 1. Wait for Firebase SDK to be ready
            if (!window.firebaseReady) {
                console.log('📄 [DEBUG] Waiting for firebaseReady...');
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
                console.log('📄 [DEBUG] firebaseReady received');
            }

            console.log('📄 [DEBUG] After firebaseReady - firebaseAuth.currentUser:', window.firebaseAuth?.currentUser?.email || 'null');

            // 2. Wait for data manager to exist
            if (!window.dataManager) {
                console.error('❌ Data manager not available');
                return;
            }

            // 3. Check auth and load - same pattern as index.html (which works on mobile)
            let hasLoaded = false;
            const checkAuthAndLoad = async () => {
                // Check Firebase directly - this is the source of truth
                const user = window.firebaseAuth?.currentUser;
                console.log('📄 [DEBUG] checkAuthAndLoad - user:', user?.email || 'null', 'hasLoaded:', hasLoaded);

                if (user && !hasLoaded) {
                    hasLoaded = true;
                    console.log('✅ User authenticated, loading workout database');
                    await initWorkoutDatabase();
                } else if (!user) {
                    console.log('⏭️ User not authenticated, waiting for auth state change');
                }
            };

            // Initial check
            await checkAuthAndLoad();

            // Listen for auth state changes (handles delayed auth on mobile)
            if (window.firebaseAuth) {
                console.log('📄 [DEBUG] Setting up onAuthStateChanged listener');
                window.firebaseAuth.onAuthStateChanged(async (user) => {
                    console.log('🔄 [DEBUG] onAuthStateChanged fired - user:', user?.email || 'null');
                    if (user) {
                        await checkAuthAndLoad();
                    }
                });
            } else {
                console.error('❌ [DEBUG] firebaseAuth not available!');
            }

            // MOBILE FALLBACK: If no data loaded after 3 seconds, try again with dataManager
            setTimeout(async () => {
                if (!hasLoaded) {
                    console.log('📄 [DEBUG] Mobile fallback triggered - checking dataManager');
                    const fbUser = window.dataManager?.getFirebaseUser();
                    console.log('📄 [DEBUG] dataManager.getFirebaseUser():', fbUser?.email || 'null');
                    if (fbUser) {
                        hasLoaded = true;
                        console.log('✅ [DEBUG] Mobile fallback - user found, loading');
                        await initWorkoutDatabase();
                    } else {
                        console.log('⚠️ [DEBUG] Mobile fallback - still no user after 3s');
                    }
                }
            }, 3000);

            console.log('✅ Workout Database page ready!');

            // MOBILE DEBUG: Show visible status panel (remove after debugging)
            if (window.location.search.includes('debug=1')) {
                const debugPanel = document.createElement('div');
                debugPanel.id = 'mobileDebugPanel';
                debugPanel.style.cssText = 'position:fixed;bottom:60px;left:10px;right:10px;background:#222;color:#0f0;padding:10px;font-family:monospace;font-size:11px;z-index:9999;max-height:200px;overflow-y:auto;border-radius:8px;border:1px solid #0f0;';
                debugPanel.innerHTML = '<b>🔍 DEBUG PANEL</b><br>';
                document.body.appendChild(debugPanel);

                window.mobileDebugLog = (msg) => {
                    const time = new Date().toLocaleTimeString();
                    debugPanel.innerHTML += `${time}: ${msg}<br>`;
                    debugPanel.scrollTop = debugPanel.scrollHeight;
                    console.log('[MOBILE DEBUG]', msg);
                };

                window.mobileDebugLog('firebaseReady: ' + window.firebaseReady);
                window.mobileDebugLog('firebaseAuth exists: ' + (!!window.firebaseAuth));
                window.mobileDebugLog('currentUser: ' + (window.firebaseAuth?.currentUser?.email || 'NULL'));
                window.mobileDebugLog('UID: ' + (window.firebaseAuth?.currentUser?.uid || 'NULL'));
                window.mobileDebugLog('isOnline: ' + window.dataManager?.isOnline);
                window.mobileDebugLog('hasLoaded: ' + hasLoaded);

                // Log when auth state changes
                if (window.firebaseAuth) {
                    window.firebaseAuth.onAuthStateChanged((user) => {
                        window.mobileDebugLog('🔄 AUTH: ' + (user?.email || 'null') + ' UID:' + (user?.uid?.substring(0,8) || 'null'));
                    });
                }

                // Show workout count when state updates
                const checkWorkouts = () => {
                    const count = window.ffn?.workoutDatabase?.all?.length || 0;
                    window.mobileDebugLog('📊 Workouts loaded: ' + count);
                };

                // Check after 5 seconds
                setTimeout(checkWorkouts, 5000);

                // Update every 3 seconds
                setInterval(() => {
                    const count = window.ffn?.workoutDatabase?.all?.length || 0;
                    window.mobileDebugLog('-- POLL: user=' + (window.firebaseAuth?.currentUser?.email || 'NULL') + ' workouts=' + count);
                }, 3000);
            }
        });

        async function initWorkoutDatabase() {
            console.log('🚀 Initializing Workout Database Page');

            // Set up event listeners
            document.getElementById('clearFiltersBtn')?.addEventListener('click', clearFilters);

            // Initialize favorites filter toggle
            document.getElementById('favoritesFilterToggle')?.addEventListener('change', (e) => {
                if (window.filterFavoritesOnly) {
                    window.filterFavoritesOnly(e.target.checked);
                }
            });

            // Initialize delete mode toggle
            if (window.initDeleteModeToggle) {
                initDeleteModeToggle();
            }

            // Initialize toolbar search
            if (window.initToolbarSearch) {
                initToolbarSearch();
            }

            // Load workouts
            await loadWorkouts();

            // Render Favorites section
            if (window.renderFavoritesSection) {
                renderFavoritesSection();
            }

            console.log('✅ Workout Database initialized');
        }
    </script>
