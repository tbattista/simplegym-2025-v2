    <!-- Initialize Public Workouts Page -->
    <script>
        // Initialize global state
        window.ffn = window.ffn || {};
        window.ffn.publicWorkouts = {
            all: [],
            displayed: [],
            currentPage: 1,
            pageSize: 20,
            totalCount: 0,
            filters: {
                search: '',
                tags: [],
                sortBy: 'created_at'
            }
        };

        // Initialize page
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Public Workouts Page - DOM Ready');
            
            // Wait for Firebase to be ready
            if (!window.firebaseReady) {
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
            }
            
            // Wait a moment for auth state to settle
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Initialize public workouts page
            if (window.initPublicWorkoutsPage) {
                window.initPublicWorkoutsPage();
            }
            
            console.log('✅ Public Workouts page ready!');
        });
    </script>
