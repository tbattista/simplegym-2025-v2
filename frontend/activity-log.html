    <!-- Initialize -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Activity Log Page - DOM Ready');

            // Set default date/time to now
            const now = new Date();
            const localIso = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');
            document.getElementById('sessionDateTime').value = localIso;

            // 1. Wait for Firebase SDK to be ready
            if (!window.firebaseReady) {
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
            }

            // 2. Wait for data manager
            if (!window.dataManager) {
                console.error('❌ Data manager not available');
                return;
            }

            // 3. Check auth and load
            let hasLoaded = false;
            const checkAuthAndLoad = async () => {
                const user = window.firebaseAuth?.currentUser;

                if (user && !hasLoaded) {
                    hasLoaded = true;
                    document.getElementById('authRequiredState').style.display = 'none';
                    document.getElementById('activityLogContent').style.display = 'block';
                    console.log('✅ User authenticated, initializing activity log');
                    if (window.initActivityLog) {
                        await window.initActivityLog();
                    }
                } else if (!user) {
                    document.getElementById('authRequiredState').style.display = 'block';
                    document.getElementById('activityLogContent').style.display = 'none';
                }
            };

            // Initial check
            await checkAuthAndLoad();

            // Listen for auth state changes
            if (window.firebaseAuth) {
                window.firebaseAuth.onAuthStateChanged(async (user) => {
                    if (user) {
                        await checkAuthAndLoad();
                    }
                });
            }

            // MOBILE FALLBACK: If no data loaded after 3 seconds, try again
            setTimeout(async () => {
                if (!hasLoaded) {
                    const fbUser = window.dataManager?.getFirebaseUser();
                    if (fbUser) {
                        hasLoaded = true;
                        document.getElementById('authRequiredState').style.display = 'none';
                        document.getElementById('activityLogContent').style.display = 'block';
                        if (window.initActivityLog) {
                            await window.initActivityLog();
                        }
                    }
                }
            }, 3000);

            // Rotate chevron on Quick Log collapse toggle
            const quickLogBody = document.getElementById('quickLogBody');
            const quickLogChevron = document.getElementById('quickLogChevron');
            if (quickLogBody && quickLogChevron) {
                quickLogBody.addEventListener('show.bs.collapse', () => {
                    quickLogChevron.style.transform = 'rotate(180deg)';
                });
                quickLogBody.addEventListener('hide.bs.collapse', () => {
                    quickLogChevron.style.transform = 'rotate(0deg)';
                });
            }

            // Wire up Universal Logger button
            document.getElementById('openUniversalLoggerBtn')?.addEventListener('click', () => {
                if (typeof window.createUniversalLogger === 'function') {
                    window.createUniversalLogger({
                        onSaveComplete: () => {
                            if (window.loadRecentCardioSessions) window.loadRecentCardioSessions();
                        }
                    });
                }
            });

            console.log('✅ Activity Log page ready!');
        });
    </script>
