  <body>
    
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->

          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">

            <div class="container-xxl flex-grow-1 container-p-y">
              
              <!-- Programs List Section -->
              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h6 class="mb-0">
                    <i class="bx bx-folder me-1"></i>
                    Programs List
                  </h6>
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch"
                           id="deleteModeToggle" style="cursor: pointer;">
                    <label class="form-check-label" for="deleteModeToggle" style="cursor: pointer;">
                      <span class="delete-mode-label">Delete Mode</span>
                    </label>
                  </div>
                </div>
                <p class="text-muted small mb-3">Browse and manage your <span id="totalProgramsCount">0</span> training programs</p>
                
                <!-- Programs Grid Container -->
                <div id="programsGridContainer">
                  <!-- Loading state -->
                  <div id="programsLoadingState" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                      <span class="visually-hidden">Loading programs...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading programs...</p>
                  </div>
                  
                  <!-- Empty state (hidden by default) -->
                  <div id="programsEmptyState" class="text-center py-5" style="display: none;">
                    <i class="bx bx-folder-open display-1 text-muted mb-3"></i>
                    <h5>No Programs Yet</h5>
                    <p class="text-muted">Create your first program to get started</p>
                    <button class="btn btn-primary mt-3" onclick="showProgramModal()">
                      <i class="bx bx-plus me-1"></i>Create Your First Program
                    </button>
                  </div>
                  
                  <!-- Programs Grid (hidden by default) -->
                  <div id="programsGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" style="display: none;">
                    <!-- Program cards will be rendered here -->
                  </div>
                </div>
              </div>
            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->

      <!-- Overlay -->

    <!-- Program Modal -->
    <div class="modal fade" id="programModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="programModalTitle">Create Program</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="programForm">
                        <div class="mb-3">
                            <label for="programName" class="form-label">Program Name *</label>
                            <input type="text" class="form-control" id="programName" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label for="programDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="programDescription" rows="3" maxlength="1000"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="programDuration" class="form-label">Duration (weeks)</label>
                                <input type="number" class="form-control" id="programDuration" min="1" max="52">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="programDifficulty" class="form-label">Difficulty Level</label>
                                <select class="form-select" id="programDifficulty">
                                    <option value="beginner">Beginner</option>
                                    <option value="intermediate" selected>Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="programTags" class="form-label">Tags (comma-separated)</label>
                            <input type="text" class="form-control" id="programTags" placeholder="e.g., strength, hypertrophy, split">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveProgramBtn">Save Program</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bx bx-show me-2"></i>
                        Program Preview
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- Loading spinner for preview -->
                    <div id="previewLoading" class="d-flex justify-content-center align-items-center" style="height: 400px;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading preview...</span>
                        </div>
                    </div>
                    
                    <!-- Preview Content -->
                    <iframe id="previewFrame" style="width: 100%; height: 80vh; border: none;" class="d-none"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="generateFromPreviewBtn">
                        <i class="bx bx-download me-1"></i>
                        Generate Document
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generation Options Modal -->
    <div class="modal fade" id="generateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Generate Program Document</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateForm">
                        <div class="mb-3">
                            <label class="form-label">Document Format</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="format" id="formatHtml" value="html" checked>
                                <label class="btn btn-outline-primary" for="formatHtml">
                                    <i class="bx bx-code-slash me-1"></i>
                                    HTML
                                </label>
                                <input type="radio" class="btn-check" name="format" id="formatPdf" value="pdf">
                                <label class="btn btn-outline-primary" for="formatPdf">
                                    <i class="bx bx-file-earmark-pdf me-1"></i>
                                    PDF
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="startDate" class="form-label">Program Start Date</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeCover" checked>
                                <label class="form-check-label" for="includeCover">
                                    Include cover page
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeToc" checked>
                                <label class="form-check-label" for="includeToc">
                                    Include table of contents
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeProgress" checked>
                                <label class="form-check-label" for="includeProgress">
                                    Include progress tracking pages
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="confirmGenerateBtn">
                        <i class="bx bx-download me-1"></i>
                        Generate Document
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Initialize Programs Page -->
    <script>
        // Initialize global state for programs
        window.ghostGym = window.ghostGym || {
            programs: [],
            workouts: [],
            currentProgram: null,
            // Add exercises structure for compatibility
            exercises: {
                all: [],
                favorites: new Set(),
                custom: []
            },
            // Programs page state
            programsPage: {
                all: [],
                filtered: [],
                displayed: [],
                currentPage: 1,
                pageSize: 50,
                deleteMode: false,
                filters: {
                    search: '',
                    tags: [],
                    sortBy: 'modified_date',
                    sortOrder: 'desc'
                },
                stats: {
                    total: 0,
                    showing: 0
                }
            }
        };

        // Track if we've loaded data yet
        let dataLoaded = false;
        
        // Initialize when Firebase is ready
        document.addEventListener('DOMContentLoaded', function() {
            if (window.firebaseReady) {
                initProgramsPage();
            } else {
                window.addEventListener('firebaseReady', initProgramsPage);
            }
        });
        
        // Listen for auth state changes and reload data
        window.addEventListener('authStateChanged', function(event) {
            console.log('🔄 Auth state changed event received, reloading programs...', event.detail);
            if (dataLoaded && event.detail.isAuthenticated) {
                // User just signed in, reload from Firestore
                loadProgramsData();
            }
        });
        
        async function loadProgramsData() {
            // Show loading state
            document.getElementById('programsLoadingState').style.display = 'block';
            document.getElementById('programsEmptyState').style.display = 'none';
            document.getElementById('programsGrid').style.display = 'none';
            
            if (window.dataManager) {
                try {
                    const programs = await window.dataManager.getPrograms();
                    window.ghostGym.programs = programs || [];
                    window.ghostGym.programsPage.all = programs || [];
                    console.log(`✅ Loaded ${window.ghostGym.programs.length} programs`, programs);
                } catch (error) {
                    console.error('❌ Error loading programs:', error);
                    window.ghostGym.programs = [];
                    window.ghostGym.programsPage.all = [];
                }
                
                try {
                    const workouts = await window.dataManager.getWorkouts();
                    window.ghostGym.workouts = workouts || [];
                    console.log(`✅ Loaded ${window.ghostGym.workouts.length} workouts`);
                } catch (error) {
                    console.error('❌ Error loading workouts:', error);
                    window.ghostGym.workouts = [];
                }
            } else {
                console.error('❌ dataManager not available');
                window.ghostGym.programs = [];
                window.ghostGym.programsPage.all = [];
            }
            
            // Render programs
            renderProgramsGrid();
            
            dataLoaded = true;
        }

        async function initProgramsPage() {
            console.log('🚀 Initializing Programs Page');
            
            // Check authentication state
            console.log('🔍 Auth check:', {
                authService: !!window.authService,
                isAuthenticated: window.authService?.isUserAuthenticated(),
                currentUser: window.authService?.getCurrentUser()?.email,
                dataManager: !!window.dataManager,
                storageMode: window.dataManager?.getStorageMode(),
                isOnline: navigator.onLine
            });
            
            // Set up event listeners
            document.getElementById('saveProgramBtn')?.addEventListener('click', saveProgram);
            document.getElementById('confirmGenerateBtn')?.addEventListener('click', generateDocument);
            
            // Initialize delete mode toggle
            initDeleteModeToggle();
            
            // Bottom action bar auto-initializes via bottom-action-bar-service.js
            // based on URL detection (programs.html -> 'programs' config)
            
            // Load data
            await loadProgramsData();
            
            console.log('✅ Programs Page initialized');
        }
        
        /**
         * Initialize delete mode toggle
         */
        function initDeleteModeToggle() {
            const toggle = document.getElementById('deleteModeToggle');
            if (!toggle) return;
            
            toggle.addEventListener('change', function() {
                window.ghostGym.programsPage.deleteMode = this.checked;
                document.body.classList.toggle('delete-mode-active', this.checked);
                renderProgramsGrid();
            });
        }
        
        /**
         * Render programs in grid layout using ProgramCard component
         */
        function renderProgramsGrid() {
            const loadingState = document.getElementById('programsLoadingState');
            const emptyState = document.getElementById('programsEmptyState');
            const grid = document.getElementById('programsGrid');
            const countEl = document.getElementById('totalProgramsCount');
            
            // Hide loading state
            loadingState.style.display = 'none';
            
            // Get filtered programs
            const searchTerm = window.ghostGym.programsPage.filters.search.toLowerCase();
            const filteredPrograms = window.ghostGym.programs.filter(program =>
                program.name.toLowerCase().includes(searchTerm) ||
                (program.description || '').toLowerCase().includes(searchTerm) ||
                (program.tags || []).some(tag => tag.toLowerCase().includes(searchTerm))
            );
            
            // Update count
            if (countEl) {
                countEl.textContent = filteredPrograms.length;
            }
            
            // Update stats
            window.ghostGym.programsPage.stats.total = window.ghostGym.programs.length;
            window.ghostGym.programsPage.stats.showing = filteredPrograms.length;
            
            // Show empty state if no programs
            if (filteredPrograms.length === 0) {
                emptyState.style.display = 'block';
                grid.style.display = 'none';
                
                // Update empty state message based on search
                const emptyTitle = emptyState.querySelector('h5');
                const emptyText = emptyState.querySelector('p');
                const emptyBtn = emptyState.querySelector('button');
                
                if (searchTerm) {
                    emptyTitle.textContent = `No Programs Match "${searchTerm}"`;
                    emptyText.textContent = 'Try adjusting your search or create a new program';
                    emptyBtn.style.display = 'none';
                } else {
                    emptyTitle.textContent = 'No Programs Yet';
                    emptyText.textContent = 'Create your first program to get started';
                    emptyBtn.style.display = 'inline-block';
                }
                return;
            }
            
            // Show grid
            emptyState.style.display = 'none';
            grid.style.display = 'flex';
            grid.innerHTML = '';
            
            // Render program cards
            const deleteMode = window.ghostGym.programsPage.deleteMode;
            
            filteredPrograms.forEach(program => {
                const card = new ProgramCard(program, {
                    showStats: true,
                    showTags: true,
                    showDescription: true,
                    showDifficulty: true,
                    showDuration: true,
                    deleteMode: deleteMode,
                    workouts: window.ghostGym.workouts,
                    onDelete: deleteMode ? handleDeleteProgram : null,
                    onCardClick: (prog) => showProgramDetailOffcanvas(prog),
                    actions: deleteMode ? [] : [
                        {
                            id: 'open',
                            label: 'Open',
                            icon: 'bx-folder-open',
                            variant: 'outline-primary',
                            onClick: (prog) => selectProgramAndGoToBuilder(prog.id)
                        },
                        {
                            id: 'edit',
                            label: 'Edit',
                            icon: 'bx-edit',
                            variant: 'outline-secondary',
                            onClick: (prog) => editProgram(prog.id)
                        }
                    ]
                });
                
                grid.appendChild(card.render());
            });
        }
        
        /**
         * Handle program deletion
         */
        async function handleDeleteProgram(programId, programName) {
            if (!confirm(`Are you sure you want to delete "${programName}"?\n\nThis action cannot be undone.`)) {
                return;
            }
            
            try {
                // Delete from data manager
                if (window.dataManager && window.dataManager.deleteProgram) {
                    await window.dataManager.deleteProgram(programId);
                }
                
                // Remove from local state
                window.ghostGym.programs = window.ghostGym.programs.filter(p => p.id !== programId);
                window.ghostGym.programsPage.all = window.ghostGym.programs;
                
                // Re-render
                renderProgramsGrid();
                
                // Show success message
                if (window.showAlert) {
                    showAlert(`Program "${programName}" deleted successfully`, 'success');
                }
            } catch (error) {
                console.error('❌ Error deleting program:', error);
                if (window.showAlert) {
                    showAlert('Failed to delete program: ' + error.message, 'danger');
                }
            }
        }
        
        /**
         * Show program detail in offcanvas (similar to workout detail)
         */
        function showProgramDetailOffcanvas(program) {
            // For now, just open the edit modal
            // TODO: Create a proper offcanvas detail view like workout-database
            editProgram(program.id);
        }

        // Show program modal
        function showProgramModal() {
            clearProgramForm();
            document.getElementById('programModalTitle').textContent = 'Create Program';
            const modal = new bootstrap.Modal(document.getElementById('programModal'));
            modal.show();
        }
        
        // Make functions globally accessible for bottom action bar
        window.renderProgramsGrid = renderProgramsGrid;
        window.showProgramModal = showProgramModal;
    </script>
