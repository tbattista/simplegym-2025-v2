  <body>
    
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <!-- Page Header -->
              <div class="mb-3">
                <h6 class="mb-2">
                  <i class="bx bx-folder me-1"></i>
                  Programs
                </h6>
                <p class="text-muted small mb-3">Organize your <span id="totalProgramsCount">0</span> training programs</p>
              </div>

              <!-- Programs Toolbar -->
              <div class="programs-toolbar mb-3" id="programsToolbar">
                <!-- Search Input -->
                <div class="programs-toolbar-search">
                  <i class="bx bx-search"></i>
                  <input type="text"
                         id="programSearchInput"
                         placeholder="Search programs..."
                         autocomplete="off">
                  <button class="programs-toolbar-clear"
                          id="clearSearchBtn"
                          style="display: none;"
                          type="button">
                    <i class="bx bx-x"></i>
                  </button>
                </div>

                <!-- Sort Cycle Button -->
                <button class="btn btn-outline-secondary programs-toolbar-btn"
                        id="sortCycleBtn"
                        type="button">
                  <i class="bx bx-sort-alt-2"></i>
                  <span class="sort-label">Newest</span>
                </button>

                <!-- Filter Button -->
                <button class="btn btn-outline-secondary programs-toolbar-btn"
                        id="filterBtn"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#filtersOffcanvas">
                  <i class="bx bx-filter"></i>
                  <span class="filter-label">Filter</span>
                  <span class="filter-badge badge bg-primary ms-1" id="filterBadge" style="display: none;">0</span>
                </button>

                <!-- Delete Mode Toggle Button -->
                <button class="btn btn-outline-secondary programs-toolbar-btn"
                        id="deleteModeBtn"
                        type="button"
                        title="Toggle delete mode">
                  <i class="bx bx-trash"></i>
                  <span class="delete-label">Delete</span>
                </button>

                <!-- Create Button -->
                <button class="btn btn-primary programs-toolbar-btn"
                        type="button"
                        id="createProgramBtn">
                  <i class="bx bx-plus"></i>
                  <span class="create-label">New</span>
                </button>
              </div>

              <!-- Hidden delete mode toggle (for state management) -->
              <input class="form-check-input" type="checkbox" role="switch"
                     id="deleteModeToggle" style="display: none;">

              <!-- Programs Grid Container (managed by ProgramGrid component) -->
              <div id="programsGridContainer">
                <!-- Grid content will be rendered by ProgramGrid -->
              </div>
            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->

    <!-- Filters Offcanvas (Bottom) -->
    <div class="offcanvas offcanvas-bottom offcanvas-bottom-base offcanvas-bottom-compact" tabindex="-1" id="filtersOffcanvas" aria-labelledby="filtersOffcanvasLabel" data-bs-scroll="false">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="filtersOffcanvasLabel">
          <i class="bx bx-filter-alt me-2"></i>
          Filter Programs
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <!-- Difficulty Filter -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Difficulty</label>
          <div class="btn-group w-100" role="group">
            <button type="button" class="btn btn-outline-secondary active" data-filter-difficulty="all">All</button>
            <button type="button" class="btn btn-outline-success" data-filter-difficulty="beginner">Beginner</button>
            <button type="button" class="btn btn-outline-warning" data-filter-difficulty="intermediate">Intermediate</button>
            <button type="button" class="btn btn-outline-danger" data-filter-difficulty="advanced">Advanced</button>
          </div>
        </div>

        <!-- Tags Filter -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Filter by Tags</label>
          <div id="tagsFilterContainer">
            <p class="text-muted small">Loading tags...</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="mb-0">
          <label class="form-label fw-semibold">Your Stats</label>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Total Programs:</span>
            <span class="fw-semibold" id="totalCount">0</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted">Showing:</span>
            <span class="fw-semibold" id="showingCount">0</span>
          </div>
        </div>
      </div>
      <div class="offcanvas-footer">
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary flex-fill" id="clearFiltersBtn">
            <i class="bx bx-x me-1"></i>
            Clear Filters
          </button>
          <button type="button" class="btn btn-primary flex-fill" data-bs-dismiss="offcanvas">
            <i class="bx bx-check me-1"></i>
            Done
          </button>
        </div>
      </div>
    </div>

    <!-- Program Modal -->
    <div class="modal fade" id="programModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="programModalTitle">Create Program</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="programForm">
                        <div class="mb-3">
                            <label for="programName" class="form-label">Program Name *</label>
                            <input type="text" class="form-control" id="programName" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label for="programDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="programDescription" rows="3" maxlength="1000"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="programDuration" class="form-label">Duration (weeks)</label>
                                <input type="number" class="form-control" id="programDuration" min="1" max="52">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="programDifficulty" class="form-label">Difficulty Level</label>
                                <select class="form-select" id="programDifficulty">
                                    <option value="beginner">Beginner</option>
                                    <option value="intermediate" selected>Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="programTags" class="form-label">Tags (comma-separated)</label>
                            <input type="text" class="form-control" id="programTags" placeholder="e.g., strength, hypertrophy, split">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveProgramBtn">Save Program</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bx bx-show me-2"></i>
                        Program Preview
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- Loading spinner for preview -->
                    <div id="previewLoading" class="d-flex justify-content-center align-items-center" style="height: 400px;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading preview...</span>
                        </div>
                    </div>
                    
                    <!-- Preview Content -->
                    <iframe id="previewFrame" style="width: 100%; height: 80vh; border: none;" class="d-none"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="generateFromPreviewBtn">
                        <i class="bx bx-download me-1"></i>
                        Generate Document
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generation Options Modal -->
    <div class="modal fade" id="generateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Generate Program Document</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="generateForm">
                        <div class="mb-3">
                            <label class="form-label">Document Format</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="format" id="formatHtml" value="html" checked>
                                <label class="btn btn-outline-primary" for="formatHtml">
                                    <i class="bx bx-code-slash me-1"></i>
                                    HTML
                                </label>
                                <input type="radio" class="btn-check" name="format" id="formatPdf" value="pdf">
                                <label class="btn btn-outline-primary" for="formatPdf">
                                    <i class="bx bx-file-earmark-pdf me-1"></i>
                                    PDF
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="startDate" class="form-label">Program Start Date</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeCover" checked>
                                <label class="form-check-label" for="includeCover">
                                    Include cover page
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeToc" checked>
                                <label class="form-check-label" for="includeToc">
                                    Include table of contents
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="includeProgress" checked>
                                <label class="form-check-label" for="includeProgress">
                                    Include progress tracking pages
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="confirmGenerateBtn">
                        <i class="bx bx-download me-1"></i>
                        Generate Document
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Initialize Programs Page -->
    <script>
        // programs-page.js handles all initialization and state management
        // This script just bridges legacy functions for backward compatibility

        // Initialize page with proper auth waiting (fixes mobile race condition)
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Programs Page - DOM Ready');

            // 1. Wait for Firebase SDK to be ready
            if (!window.firebaseReady) {
                await new Promise(resolve => {
                    window.addEventListener('firebaseReady', resolve, { once: true });
                });
            }

            // 2. Wait for data manager to exist
            if (!window.dataManager) {
                console.error('❌ Data manager not available');
                return;
            }

            // 3. Wait for auth state to be FULLY determined (key fix for mobile)
            await window.dataManager.waitForAuthReady();
            console.log('📄 Auth ready, storageMode:', window.dataManager.getStorageMode());

            // 4. Initialize programs page
            if (window.initProgramsPage) {
                window.initProgramsPage();
            }

            // 5. Listen for future auth state changes
            if (window.firebaseAuth) {
                window.firebaseAuth.onAuthStateChanged(async (user) => {
                    console.log('🔄 Auth state changed:', user ? 'authenticated' : 'not authenticated');

                    if (user) {
                        // Wait for dataManager to sync storageMode
                        await new Promise(resolve => setTimeout(resolve, 300));

                        if (window.initProgramsPage) {
                            window.initProgramsPage();
                        }
                    }
                });
            }

            console.log('✅ Programs page ready!');
        });

        // Legacy function for modal-based program creation (still used by modals)
        function showProgramModal() {
            if (typeof clearProgramForm === 'function') {
                clearProgramForm();
            }
            document.getElementById('programModalTitle').textContent = 'Create Program';
            const modal = new bootstrap.Modal(document.getElementById('programModal'));
            modal.show();
        }

        // Make showProgramModal globally accessible
        window.showProgramModal = showProgramModal;
    </script>
