        /**
         * ============================================
         * REST TIMER CLASS
         * ============================================
         * Copied exactly from workout-mode-refactored.js
         */
        class RestTimer {
            constructor(timerId, restSeconds) {
                this.timerId = timerId;
                this.totalSeconds = restSeconds;
                this.remainingSeconds = restSeconds;
                this.state = 'ready'; // ready, counting, paused, done
                this.interval = null;
                this.element = null;
            }

            start() {
                if (this.state !== 'ready') return;
                
                this.state = 'counting';
                this.remainingSeconds = this.totalSeconds;
                this.startCountdown();
                this.render();
            }

            pause() {
                if (this.state !== 'counting') return;
                
                this.state = 'paused';
                this.stopCountdown();
                this.render();
            }

            resume() {
                if (this.state !== 'paused') return;
                
                this.state = 'counting';
                this.startCountdown();
                this.render();
            }

            reset() {
                this.state = 'ready';
                this.remainingSeconds = this.totalSeconds;
                this.stopCountdown();
                this.render();
            }

            startCountdown() {
                this.interval = setInterval(() => {
                    this.remainingSeconds--;
                    
                    if (this.remainingSeconds <= 0) {
                        this.complete();
                    } else {
                        this.render();
                    }
                }, 1000);
            }

            stopCountdown() {
                if (this.interval) {
                    clearInterval(this.interval);
                    this.interval = null;
                }
            }

            complete() {
                this.stopCountdown();
                this.state = 'done';
                this.remainingSeconds = 0;
                
                // Play beep if sound is enabled
                if (window.demoSoundEnabled) {
                    this.playBeep();
                }
                
                this.render();
            }

            playBeep() {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.01);
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.3);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                } catch (error) {
                    console.warn('Could not play beep:', error);
                }
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            render() {
                this.element = document.querySelector(`[data-timer-id="${this.timerId}"]`);
                if (!this.element) return;
                
                // Check if we're in grid layout (parent has workout-button-grid class)
                const isGridLayout = this.element.closest('.workout-button-grid') !== null;
                
                let labelHtml = '';
                let buttonHtml = '';
                
                switch (this.state) {
                    case 'ready':
                        labelHtml = `Rest: ${this.totalSeconds}s`;
                        buttonHtml = `<button class="btn btn-success ${isGridLayout ? 'workout-grid-btn' : 'flex-fill'}" onclick="window.startTimer('${this.timerId}')">
                            <i class="bx bx-play me-1"></i>Start Rest
                        </button>`;
                        break;
                        
                    case 'counting':
                        const displayClass = this.remainingSeconds <= 5 ? 'text-danger' :
                                           this.remainingSeconds <= 10 ? 'text-warning' : 'text-success';
                        labelHtml = `<span class="${displayClass}">${this.formatTime(this.remainingSeconds)}</span>`;
                        buttonHtml = `<button class="btn btn-outline-secondary ${isGridLayout ? 'workout-grid-btn' : 'flex-fill'}" onclick="window.pauseTimer('${this.timerId}')">
                            <i class="bx bx-stop-circle me-1"></i>Stop
                        </button>`;
                        break;
                        
                    case 'paused':
                        labelHtml = `<span class="text-warning">${this.formatTime(this.remainingSeconds)}</span>`;
                        // Two buttons side-by-side: Reset and Resume
                        if (isGridLayout) {
                            buttonHtml = `
                                <div class="d-flex gap-1 w-100">
                                    <button class="btn btn-outline-secondary flex-fill" onclick="window.resetTimer('${this.timerId}')" style="padding: 0.5rem 0.25rem;">
                                        <i class="bx bx-reset"></i>
                                    </button>
                                    <button class="btn btn-success flex-fill" onclick="window.resumeTimer('${this.timerId}')" style="padding: 0.5rem 0.25rem;">
                                        <i class="bx bx-play"></i>
                                    </button>
                                </div>
                            `;
                        } else {
                            buttonHtml = `
                                <button class="btn btn-outline-secondary flex-fill" onclick="window.resetTimer('${this.timerId}')">
                                    <i class="bx bx-reset me-1"></i>Reset
                                </button>
                                <button class="btn btn-success flex-fill" onclick="window.resumeTimer('${this.timerId}')">
                                    <i class="bx bx-play me-1"></i>Resume
                                </button>
                            `;
                        }
                        break;
                        
                    case 'done':
                        labelHtml = `<span class="text-success"><i class="bx bx-check-circle me-1"></i>Done!</span>`;
                        buttonHtml = `<button class="btn btn-success ${isGridLayout ? 'workout-grid-btn' : 'flex-fill'}" onclick="window.resetTimer('${this.timerId}')">
                            <i class="bx bx-refresh me-1"></i>Start
                        </button>`;
                        break;
                }
                
                if (isGridLayout) {
                    // Grid layout: render label in timer container, button goes in separate grid cell
                    this.element.innerHTML = labelHtml;
                    
                    // Find the button slot - it's the next sibling of the timer's parent (.rest-timer-grid-label)
                    const timerLabel = this.element.closest('.rest-timer-grid-label');
                    if (timerLabel) {
                        const buttonSlot = timerLabel.nextElementSibling;
                        if (buttonSlot && buttonSlot.classList.contains('rest-timer-button-slot')) {
                            buttonSlot.innerHTML = buttonHtml;
                        }
                    }
                } else {
                    // Flex layout: render as two separate elements
                    this.element.innerHTML = `
                        <div class="rest-timer-label-col flex-fill d-flex align-items-center justify-content-center">
                            ${labelHtml}
                        </div>
                        ${buttonHtml}
                    `;
                }
            }
        }

        /**

         * CARD INTERACTION FUNCTIONS

        window.toggleExerciseCard = function(index) {
            const card = document.querySelector(`.exercise-card[data-exercise-index="${index}"]`);
            if (!card) return;
            
            const isExpanded = card.classList.contains('expanded');
            
            if (isExpanded) {
                collapseCard(card);
            } else {
                // Collapse all other cards
                document.querySelectorAll('.exercise-card.expanded').forEach(otherCard => {
                    collapseCard(otherCard);
                });
                expandCard(card);
            }
        };
        
        window.goToNextExercise = function(currentIndex) {
            const allCards = document.querySelectorAll('.exercise-card');
            const nextIndex = currentIndex + 1;
            
            if (nextIndex < allCards.length) {
                const currentCard = allCards[currentIndex];
                collapseCard(currentCard);
                
                setTimeout(() => {
                    toggleExerciseCard(nextIndex);
                }, 300);
            } else {
                // Last exercise
                alert('🎉 Demo Complete! In the real app, this would show the workout completion dialog.');
            }
        };
        
        window.handleWeightButtonClick = function(button) {
            const exerciseName = button.getAttribute('data-exercise-name');
            const currentWeight = button.getAttribute('data-current-weight');
            const currentUnit = button.getAttribute('data-current-unit');
            
            alert(`Edit Weight for ${exerciseName}\n\nCurrent: ${currentWeight || 'Not set'} ${currentUnit}\n\nIn the real app, this opens a weight edit offcanvas.`);
        };
        
        function expandCard(card) {
            card.classList.add('expanded');
            const body = card.querySelector('.exercise-card-body');
            if (body) {
                body.style.display = 'block';
            }
            
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
        
        function collapseCard(card) {
            card.classList.remove('expanded');
            const body = card.querySelector('.exercise-card-body');
            if (body) {
                body.style.display = 'none';
            }
        }
        
        /**
         * ============================================
         * UTILITY FUNCTIONS
         * ============================================
         */
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function parseRestTime(restStr) {
            const match = restStr.match(/(\d+)/);
            return match ? parseInt(match[1]) : 60;
        }
        
        function getAlternates(exercises) {
            const alternates = [];
            if (exercises.b) alternates.push({ label: 'Alt1', name: exercises.b });
            if (exercises.c) alternates.push({ label: 'Alt2', name: exercises.c });
            return alternates;
        }
        
        /**
         * ============================================
         * WEIGHT BADGE RENDERER
         * ============================================
         */
        
        function renderWeightBadge(currentWeight, currentUnit, weightSource, lastWeight, lastWeightUnit) {
            // No current weight - show placeholder
            if (!currentWeight) {
                if (lastWeight) {
                    const unitDisplay = lastWeightUnit !== 'other' ? ` ${lastWeightUnit}` : '';
                    return `<span class="badge bg-label-secondary" title="Last used weight - click Edit Weight to use">Last: ${lastWeight}${unitDisplay}</span>`;
                }
                return `<span class="badge bg-label-secondary" title="No weight set - click Edit Weight to add">No weight</span>`;
            }
            
            // Determine progression state
            let progressionClass = '';
            let progressionIcon = '';
            let tooltipText = '';
            const unitDisplay = currentUnit !== 'other' ? ` ${currentUnit}` : '';
            
            if (!lastWeight) {
                // First time doing this exercise
                progressionClass = 'new';
                progressionIcon = '★';
                tooltipText = `${currentWeight}${unitDisplay} - First time doing this exercise!`;
            } else {
                const weightDiff = currentWeight - lastWeight;
                if (weightDiff > 0) {
                    // Weight increased
                    progressionClass = 'increased';
                    progressionIcon = '↑';
                    tooltipText = `${currentWeight}${unitDisplay} (+${weightDiff.toFixed(1)}${unitDisplay} from last time)`;
                } else if (weightDiff < 0) {
                    // Weight decreased
                    progressionClass = 'decreased';
                    progressionIcon = '↓';
                    tooltipText = `${currentWeight}${unitDisplay} (${weightDiff.toFixed(1)}${unitDisplay} from last time)`;
                } else {
                    // Same weight
                    progressionClass = 'same';
                    progressionIcon = '→';
                    tooltipText = `${currentWeight}${unitDisplay} (same as last time)`;
                }
            }
            
            // Add modified indicator if user changed from template
            const modifiedClass = weightSource === 'session' ? 'modified' : '';
            if (modifiedClass) {
                tooltipText += ' - Modified from template';
            }
            
            return `<span class="badge weight-badge ${progressionClass} ${modifiedClass}"
                          data-bs-toggle="tooltip"
                          data-bs-placement="top"
                          title="${tooltipText}">
                ${progressionIcon} ${currentWeight}${unitDisplay}
            </span>`;
        }
        
        /**

         * EXERCISE CARD RENDERER
         * ============================================
         */

            const reps = group.reps || '8-12';
            const rest = group.rest || '60s';
            const notes = group.notes || '';
            
            const restSeconds = parseRestTime(rest);
            const timerId = `timer-${index}`;
            const bonusClass = isBonus ? 'bonus-exercise' : '';
            
            // Get exercise history
            const history = demoHistory[mainExercise];
            const lastWeight = history?.last_weight || '';
            const lastWeightUnit = history?.last_weight_unit || 'lbs';
            const lastSessionDate = history?.last_session_date
                ? new Date(history.last_session_date).toLocaleDateString()
                : null;
            
            // Get session data
            const sessionData = demoSession.exercises[mainExercise];
            const isSkipped = sessionData?.is_skipped || false;
            const skipReason = sessionData?.skip_reason || '';
            
            // Get weight data with proper fallback chain
            const templateWeight = group.default_weight || '';
            const templateUnit = group.default_weight_unit || 'lbs';
            
            // Determine current weight with proper fallback
            const currentWeight = sessionData?.weight || templateWeight || lastWeight || '';
            const currentUnit = sessionData?.weight_unit ||
                              (sessionData?.weight ? templateUnit : (templateWeight ? templateUnit : lastWeightUnit));
            
            // Determine weight source for better UX feedback
            const weightSource = sessionData?.weight ? 'session' :
                               (templateWeight ? 'template' :
                               (lastWeight ? 'history' : 'none'));
            
            return `
                <div class="card exercise-card ${bonusClass} ${isSkipped ? 'skipped' : ''}" data-exercise-index="${index}" data-exercise-name="${escapeHtml(mainExercise)}">
                    <div class="card-header exercise-card-header" onclick="window.toggleExerciseCard(${index})">

                                <h6 class="mb-0">
                                    ${isSkipped ? '<i class="bx bx-x-circle text-warning me-1"></i>' : ''}
                                    ${escapeHtml(mainExercise)}
                                </h6>
                                ${renderWeightBadge(currentWeight, currentUnit, weightSource, lastWeight, lastWeightUnit)}
                            </div>
                            <div class="exercise-card-meta text-muted small">
                                ${sets} × ${reps} • Rest: ${rest}
                            </div>
                            ${alternates.length > 0 ? `
                                <div class="exercise-card-alts text-muted small mt-1">
                                    ${alternates.map(alt => `<div>${alt.label}: ${escapeHtml(alt.name)}</div>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                        <i class="bx bx-chevron-down expand-icon"></i>
                    </div>
                    
                    <div class="card-body exercise-card-body" style="display: none;">
                        ${isSkipped ? `
                            <div class="alert alert-warning mb-3">
                                <i class="bx bx-info-circle me-2"></i>
                                <strong>Exercise Skipped</strong>
                                ${skipReason ? `<p class="mb-0 mt-1 small">${escapeHtml(skipReason)}</p>` : ''}
                            </div>
                        ` : ''}
                        
                        ${lastWeight && lastSessionDate ? `
                            <div class="text-muted small mb-3">
                                <i class="bx bx-history me-1"></i>Last: ${lastWeight} ${lastWeightUnit} (${lastSessionDate})
                            </div>
                        ` : ''}
                        
                        ${notes ? `
                            <div class="alert alert-info mb-3" style="font-size: 0.875rem; padding: 0.75rem;">
                                <i class="bx bx-info-circle me-1"></i>
                                ${escapeHtml(notes)}
                            </div>
                        ` : ''}
                        
                        <!-- 2x2 Grid: Timer Row + Button Row -->
                        <div class="workout-button-grid workout-button-grid-2x2">
                            <!-- Row 1: Timer Label | Timer Button -->
                            <div class="rest-timer-grid-label">
                                <div class="rest-timer" data-timer-id="${timerId}" data-rest-seconds="${restSeconds}">
                                    Rest: ${restSeconds}s
                                </div>
                            </div>
                            <div class="rest-timer-button-slot">
                                <button class="btn btn-success workout-grid-btn" onclick="window.startTimer('${timerId}')">
                                    <i class="bx bx-play me-1"></i>Start Rest
                                </button>
                            </div>
                            
                            <!-- Row 2: Edit Weight | Next/End -->
                            <button
                                class="btn ${currentWeight ? 'btn-outline-primary' : 'btn-outline-warning'} workout-grid-btn"
                                data-exercise-name="${escapeHtml(mainExercise)}"
                                data-current-weight="${currentWeight || ''}"
                                data-current-unit="${currentUnit}"
                                data-last-weight="${lastWeight || ''}"
                                data-last-weight-unit="${lastWeightUnit || ''}"
                                data-last-session-date="${lastSessionDate || ''}"
                                data-weight-source="${weightSource}"
                                onclick="window.handleWeightButtonClick(this); event.stopPropagation();"
                                title="${currentWeight ? 'Edit current weight' : 'Set weight for this exercise'}">
                                <i class="bx ${currentWeight ? 'bx-edit-alt' : 'bx-plus-circle'} me-1"></i>${currentWeight ? 'Edit Weight' : 'Set Weight'}
                            </button>
                            
                            <button class="btn btn-primary workout-grid-btn" onclick="window.goToNextExercise(${index})">
                                ${index === totalCards - 1 ? 'End<i class="bx bx-stop-circle ms-1"></i>' : 'Next<i class="bx bx-right-arrow-alt ms-1"></i>'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        /**
         * ============================================
         * RENDER ALL CARDS
         * ============================================
         */
        
        function renderWorkout() {
            const container = document.getElementById('exerciseCardsContainer');
            if (!container) return;
            
            let html = '';
            let exerciseIndex = 0;
            
            // Calculate total cards
            const regularCount = demoWorkout.exercise_groups?.length || 0;
            const bonusCount = demoBonusExercises?.length || 0;
            const totalCards = regularCount + bonusCount;
            
            // Render regular exercise groups
            if (demoWorkout.exercise_groups && demoWorkout.exercise_groups.length > 0) {
                demoWorkout.exercise_groups.forEach((group) => {
                    html += renderExerciseCard(group, exerciseIndex, false, totalCards);
                    exerciseIndex++;
                });
            }
            
            // Render bonus exercises
            if (demoBonusExercises && demoBonusExercises.length > 0) {
                demoBonusExercises.forEach((bonus) => {
                    const bonusGroup = {
                        exercises: { a: bonus.name },
                        sets: bonus.sets,
                        reps: bonus.reps,
                        rest: bonus.rest || '60s',
                        default_weight: bonus.weight,
                        default_weight_unit: bonus.weight_unit || 'lbs',
                        notes: bonus.notes
                    };
                    html += renderExerciseCard(bonusGroup, exerciseIndex, true, totalCards);
                    exerciseIndex++;
                });
            }
            
            container.innerHTML = html;
            
            // Initialize timers
            initializeTimers();
            
            // Initialize tooltips
            initializeTooltips();
            
            // Auto-expand first card
            setTimeout(() => {
                toggleExerciseCard(0);
            }, 500);
        }
        
        /**
         * ============================================
         * INITIALIZE TIMERS
         * ============================================
         */
        
        function initializeTimers() {
            const timerElements = document.querySelectorAll('.rest-timer[data-timer-id]');
            
            timerElements.forEach(element => {
                const timerId = element.getAttribute('data-timer-id');
                const restSeconds = parseInt(element.getAttribute('data-rest-seconds')) || 60;
                
                const timer = new RestTimer(timerId, restSeconds);
                window.demoTimers[timerId] = timer;
                timer.render();
            });
            
            console.log('✅ Initialized', Object.keys(window.demoTimers).length, 'timers');
        }
        
        /**
         * ============================================
         * INITIALIZE TOOLTIPS
         * ============================================
         */
        
        function initializeTooltips() {
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            tooltipTriggerList.forEach(tooltipTriggerEl => {
                new bootstrap.Tooltip(tooltipTriggerEl);
            });
        }
        
        /**
         * ============================================
         * FLOATING TIMER
         * ============================================
         */
        
        let workoutStartTime = null;
        let floatingTimerInterval = null;
        
        function startFloatingTimer() {
            workoutStartTime = new Date();
            
            floatingTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - workoutStartTime.getTime()) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                const floatingTimer = document.getElementById('floatingTimerDisplay');
                if (floatingTimer) floatingTimer.textContent = timeStr;
            }, 1000);
        }
        
        /**
         * ============================================
         * INITIALIZE ON PAGE LOAD
         * ============================================
         */
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎮 Workout Mode Demo initializing...');
            
            // Render workout cards
            renderWorkout();
            
            // Start floating timer
            startFloatingTimer();
            
            console.log('✅ Workout Mode Demo ready');
        });
    </script>
  </body>
</html>
