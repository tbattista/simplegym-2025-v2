  <body>

    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->

          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">

              <!-- Back Button + Title -->
              <div class="d-flex align-items-center mb-4">
                <a href="exercise-database.html" class="btn btn-icon btn-outline-secondary me-3" id="backBtn">
                  <i class="bx bx-arrow-back"></i>
                </a>
                <div>
                  <h5 class="mb-0" id="pageTitle">Edit Exercise</h5>
                  <small class="text-muted" id="pageSubtitle">Loading...</small>
                </div>
              </div>

              <!-- Loading State -->
              <div id="loadingState" class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted">Loading exercise...</p>
              </div>

              <!-- Error State -->
              <div id="errorState" class="text-center py-5" style="display: none;">
                <i class="bx bx-error-circle display-1 text-danger"></i>
                <p class="text-muted mt-3" id="errorMessage">Exercise not found</p>
                <a href="exercise-database.html" class="btn btn-primary mt-2">
                  <i class="bx bx-arrow-back me-1"></i>Back to Exercises
                </a>
              </div>

              <!-- Edit Form -->
              <div id="editFormContainer" style="display: none;">
                <form id="exerciseEditForm">

                  <!-- Exercise Name -->
                  <div class="mb-4">
                    <label for="editExerciseName" class="form-label fw-semibold">Exercise Name *</label>
                    <input type="text" class="form-control form-control-lg" id="editExerciseName"
                           required maxlength="200" placeholder="Enter exercise name">
                  </div>

                  <!-- Muscle Group -->
                  <div class="mb-4">
                    <label for="editMuscleGroup" class="form-label fw-semibold">Muscle Group</label>
                    <input type="text" class="form-control" id="editMuscleGroup"
                           placeholder="e.g., Chest, Back, Legs">
                  </div>

                  <!-- Equipment -->
                  <div class="mb-4">
                    <label for="editEquipment" class="form-label fw-semibold">Equipment</label>
                    <input type="text" class="form-control" id="editEquipment"
                           placeholder="e.g., Barbell, Dumbbells, Bodyweight">
                  </div>

                  <!-- Difficulty -->
                  <div class="mb-4">
                    <label for="editDifficulty" class="form-label fw-semibold">Difficulty</label>
                    <select class="form-select" id="editDifficulty">
                      <option value="">Select difficulty...</option>
                      <option value="Beginner">Beginner</option>
                      <option value="Intermediate">Intermediate</option>
                      <option value="Advanced">Advanced</option>
                    </select>
                  </div>

                  <!-- Type / Mechanics -->
                  <div class="mb-4">
                    <label for="editMechanics" class="form-label fw-semibold">Type</label>
                    <select class="form-select" id="editMechanics">
                      <option value="">Select type...</option>
                      <option value="Compound">Compound</option>
                      <option value="Isolation">Isolation</option>
                    </select>
                  </div>

                  <!-- Link to Exercise Section -->
                  <div class="border-top pt-4 mt-4">
                    <h6 class="fw-semibold mb-2">
                      <i class="bx bx-link me-1"></i>Link to Database Exercise
                    </h6>
                    <p class="text-muted small mb-3">
                      Link to an exercise from our database to inherit its detailed data (muscles, equipment, videos, movement patterns, etc.)
                    </p>

                    <!-- Linked Exercise Display -->
                    <div id="linkedExerciseDisplay" style="display: none;" class="mb-3">
                      <div class="card bg-light border-0">
                        <div class="card-body p-3 d-flex align-items-center justify-content-between">
                          <div class="d-flex align-items-center gap-2">
                            <i class="bx bx-link text-primary"></i>
                            <div>
                              <span class="fw-semibold" id="linkedExerciseName"></span>
                              <small class="text-muted d-block" id="linkedExerciseMeta"></small>
                            </div>
                          </div>
                          <button type="button" class="btn btn-sm btn-outline-danger" id="unlinkBtn">
                            <i class="bx bx-x me-1"></i>Unlink
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- Not Linked State -->
                    <div id="notLinkedDisplay" class="mb-3">
                      <div class="card border-dashed border-0" style="border: 2px dashed #d4d8dd !important;">
                        <div class="card-body p-3 text-center text-muted">
                          <i class="bx bx-unlink d-block mb-1" style="font-size: 1.5rem;"></i>
                          <small>No exercise linked</small>
                        </div>
                      </div>
                    </div>

                    <!-- Search Button (opens offcanvas) -->
                    <button type="button" class="btn btn-outline-primary w-100" id="searchExercisesBtn">
                      <i class="bx bx-search me-2"></i>Search Exercises to Link
                    </button>
                  </div>

                </form>

                <!-- Bottom Action Buttons (not sticky, just at bottom of form) -->
                <div class="mt-5 pb-4">
                  <button type="button" class="btn btn-primary w-100 mb-3" id="saveExerciseBtn" style="padding: 0.75rem;">
                    <i class="bx bx-save me-1"></i>Save Changes
                  </button>
                  <button type="button" class="btn btn-outline-danger w-100" id="deleteExerciseBtn" style="padding: 0.75rem;">
                    <i class="bx bx-trash me-1"></i>Delete Exercise
                  </button>
                </div>
              </div>

            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
