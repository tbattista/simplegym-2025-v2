    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->

          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>
        <!-- / Menu -->

        <!-- Layout container -->
        <div class="layout-page">

          <!-- Content wrapper -->
          <div class="content-wrapper">
            <!-- Content -->
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <!-- Exercise List Section -->
              <div class="mb-3">
                <h6 class="mb-2">
                  <i class="bx bx-dumbbell me-1"></i>
                  Exercise List
                </h6>
                <p class="text-muted small mb-3">Browse and favorite from <span id="totalExercisesCount">2,583</span> exercises</p>

                <!-- Exercise Toolbar -->
                <div class="exercise-toolbar mb-3" id="exerciseToolbar">
                  <!-- Search Input -->
                  <div class="exercise-toolbar-search">
                    <i class="bx bx-search"></i>
                    <input type="text" id="exerciseSearchInput" placeholder="Search exercises..." autocomplete="off">
                    <button class="exercise-toolbar-clear" id="clearSearchBtn" style="display: none;" type="button">
                      <i class="bx bx-x"></i>
                    </button>
                  </div>

                  <!-- Sort Cycle Button -->
                  <button class="btn btn-outline-secondary exercise-toolbar-btn" id="sortCycleBtn" type="button">
                    <i class="bx bx-trending-up"></i>
                    <span class="sort-label">Popular</span>
                  </button>

                  <!-- Filter Button -->
                  <button class="btn btn-outline-secondary exercise-toolbar-btn" id="filterBtn" type="button">
                    <i class="bx bx-filter"></i>
                    <span class="filter-label">Filter</span>
                    <span class="filter-badge badge bg-primary ms-1" id="filterBadge" style="display: none;">0</span>
                  </button>

                  <!-- Custom Filter Toggle -->
                  <button class="btn btn-outline-secondary exercise-toolbar-btn" id="customToggleBtn" type="button">
                    <i class="bx bx-user"></i>
                    <span class="custom-label">Custom</span>
                  </button>

                  <!-- New Exercise Button -->
                  <button class="btn btn-primary exercise-toolbar-btn" id="customExerciseBtn" type="button"
                          data-bs-toggle="modal" data-bs-target="#customExerciseModal">
                    <i class="bx bx-plus"></i>
                    <span class="create-label">New</span>
                  </button>
                </div>

                <!-- Filter Feedback (shows active filters) -->
                <div id="filterFeedback" class="alert alert-info mb-3" style="display: none;">
                  <div id="filterFeedbackText"></div>
                </div>
                
                <!-- Split-View Layout (desktop: list + detail panel) -->
                <div class="exercise-split-layout" id="exerciseSplitLayout">
                  <!-- Exercise List Panel -->
                  <div class="exercise-list-panel" id="exerciseListPanel">
                    <div id="exerciseTableContainer"></div>
                  </div>

                  <!-- Exercise Detail Panel (desktop only) -->
                  <div class="exercise-detail-panel" id="exerciseDetailPanel" data-view="desktop">
                    <div class="exercise-detail-panel-inner" id="exerciseDetailPanelInner">
                      <!-- Empty state -->
                      <div class="exercise-detail-empty" id="exerciseDetailEmpty">
                        <i class="bx bx-dumbbell"></i>
                        <p>Select an exercise to view details</p>
                      </div>
                      <!-- Detail content (hidden until exercise selected) -->
                      <div class="exercise-detail-content" id="exerciseDetailContent" style="display: none;"></div>
                    </div>
                  </div>

                  <!-- Workout Cart Panel (desktop only) -->
                  <div class="exercise-cart-panel" id="exerciseCartPanel" data-view="desktop">
                    <div class="exercise-cart-panel-inner" id="exerciseCartPanelInner">
                      <div class="exercise-cart-empty" id="exerciseCartEmpty">
                        <i class="bx bx-cart"></i>
                        <p>Add exercises to build a workout</p>
                      </div>
                      <div class="exercise-cart-content" id="exerciseCartContent" style="display: none;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- / Content -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->
    
    <!-- Filters Offcanvas will be created dynamically by UnifiedOffcanvasFactory -->

    <!-- Exercise Detail Offcanvas will be created dynamically by ExerciseDetailOffcanvas -->

    <!-- Custom Exercise Modal -->
    <div class="modal fade" id="customExerciseModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bx bx-plus-circle me-2"></i>
              Add Custom Exercise
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="customExerciseForm">
              <div class="mb-3">
                <label for="customExerciseName" class="form-label">Exercise Name *</label>
                <input type="text" class="form-control" id="customExerciseName" required maxlength="200">
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="customMuscleGroup" class="form-label">Muscle Group</label>
                  <input type="text" class="form-control" id="customMuscleGroup" placeholder="e.g., Chest">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="customEquipment" class="form-label">Equipment</label>
                  <input type="text" class="form-control" id="customEquipment" placeholder="e.g., Dumbbells">
                </div>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="customDifficulty" class="form-label">Difficulty</label>
                  <select class="form-select" id="customDifficulty">
                    <option value="">Select...</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="customMechanics" class="form-label">Type</label>
                  <select class="form-select" id="customMechanics">
                    <option value="">Select...</option>
                    <option value="Compound">Compound</option>
                    <option value="Isolation">Isolation</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveCustomExerciseBtn">
              <i class="bx bx-save me-1"></i>
              Save Exercise
            </button>
          </div>
        </div>
      </div>
  </div>
